<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
  --accent:#7c6ff7;--accent2:#56cfb2;--text:#e8eaf6;--muted:#8b92b8;
  --free:#34d399;--paid:#f87171;--r:12px;
}
/* ─── 亮色主题（data-theme="light" 时覆盖） ─── */
[data-theme="light"]{
  --bg:#f5f6fb;--surface:#ffffff;--surface2:#eceef7;--border:#e1e4ef;
  --accent:#6d5ef0;--accent2:#149c80;--text:#1a1d27;--muted:#5f6788;
  --free:#0f9d63;--paid:#dc2626;
}
[data-theme="light"] header{background:linear-gradient(135deg,#ffffff 0%,#eef0fb 50%,#ffffff 100%)}
[data-theme="light"] header::before{background:radial-gradient(ellipse,rgba(109,94,240,.12) 0%,transparent 70%)}
[data-theme="light"] h1{background:linear-gradient(135deg,#1a1d27 0%,#6d5ef0 55%,#149c80 100%);
  -webkit-background-clip:text;background-clip:text}
[data-theme="light"] .badge{color:#6d5ef0}
[data-theme="light"] .workflow-section{background:linear-gradient(180deg,#eef0fb 0%,#f5f6fb 100%)}
[data-theme="light"] .controls{background:rgba(245,246,251,.93)}
[data-theme="light"] .card.recommended{background:linear-gradient(135deg,#ffffff,#f3f2fe)}
[data-theme="light"] .wf-step-tip{background:rgba(0,0,0,.03)}
[data-theme="light"] .theme-toggle{background:rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .25s ease,color .25s ease}

/* ─── HEADER ─── */
header{
  background:linear-gradient(135deg,#1a1d27 0%,#12142a 50%,#1a1d27 100%);
  border-bottom:1px solid var(--border);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden
}
header::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;background:radial-gradient(ellipse,rgba(124,111,247,.18) 0%,transparent 70%);pointer-events:none}
.badge{display:inline-block;background:rgba(124,111,247,.15);border:1px solid rgba(124,111,247,.4);
  color:#a89ff9;font-size:12px;padding:4px 12px;border-radius:20px;margin-bottom:14px}
h1{font-size:clamp(26px,5vw,46px);font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#a89ff9 55%,#56cfb2 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;line-height:1.2}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:24px}
.stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;text-align:center}

/* ─── WORKFLOW SECTION ─── */
.workflow-section{
  background:linear-gradient(180deg,#12142a 0%,#1a1d27 100%);
  border-bottom:1px solid var(--border);padding:36px 24px
}
.wf-inner{max-width:720px;margin:0 auto}
.wf-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;color:#fff}
.wf-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:20px}
.wf-input-wrap{position:relative;margin-bottom:14px}
.wf-input{
  width:100%;padding:14px 120px 14px 18px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:12px;color:var(--text);
  font-size:15px;outline:none;transition:border-color .2s
}
.wf-input:focus{border-color:var(--accent)}
.wf-input::placeholder{color:var(--muted)}
.wf-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;color:#fff;padding:8px 18px;
  border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s
}
.wf-btn:hover{opacity:.85}
.wf-examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.wf-tag{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.wf-tag:hover{border-color:var(--accent);color:var(--accent)}

/* ─── WORKFLOW RESULT ─── */
.wf-result{margin-top:24px;display:none}
.wf-result.show{display:block}
.wf-result-title{
  font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;
  display:flex;align-items:center;gap:8px
}
.wf-result-desc{font-size:13px;color:var(--muted);margin-bottom:18px}
.wf-steps{display:flex;flex-direction:column;gap:12px}
.wf-step{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;transition:border-color .15s
}
.wf-step:hover{border-color:rgba(124,111,247,.4)}
.wf-step-num{
  min-width:28px;height:28px;border-radius:50%;
  background:rgba(124,111,247,.2);border:1px solid rgba(124,111,247,.4);
  color:#a89ff9;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px
}
.wf-step-body{flex:1}
.wf-step-action{font-size:13px;color:var(--muted);margin-bottom:4px}
.wf-step-tool{font-size:15px;font-weight:600}
.wf-step-tool a{color:var(--accent2);text-decoration:none}
.wf-step-tool a:hover{text-decoration:underline}
.wf-step-tip{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6;
  background:rgba(255,255,255,.03);border-radius:6px;padding:6px 10px;border-left:2px solid var(--border)}
.wf-nomatch{
  text-align:center;padding:24px;color:var(--muted);font-size:14px;
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border)
}
.wf-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.wf-clear{background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.wf-clear:hover{border-color:var(--muted);color:var(--text)}
.wf-card-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;
  cursor:pointer;font-weight:600;transition:opacity .15s}
.wf-card-btn:hover{opacity:.85}

/* ─── CONTROLS ─── */
.controls{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.93);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 24px
}
.search-wrap{max-width:500px;margin:0 auto 12px;position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
#search{
  width:100%;padding:10px 16px 10px 36px;background:var(--surface2);
  border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
.filter-btn{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap
}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.quick-filters{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.quick-btn{
  padding:4px 11px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.quick-btn:hover{color:var(--text);border-color:var(--muted)}
.quick-btn.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2)}

/* ─── GRID ─── */
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.result-info{font-size:12px;color:var(--muted);margin-bottom:14px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:14px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;display:flex;flex-direction:column;gap:9px;transition:transform .15s,border-color .15s,box-shadow .15s
}
.card:hover{transform:translateY(-2px);border-color:rgba(124,111,247,.45);box-shadow:0 8px 28px rgba(124,111,247,.1)}
.card.recommended{border-color:rgba(124,111,247,.3);background:linear-gradient(135deg,#1a1d27,#1e1f35)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:15px;font-weight:600;color:#fff;text-decoration:none;display:flex;align-items:center;gap:5px}
.card-name:hover{color:#a89ff9}
.card-name .ext{font-size:10px;color:var(--muted)}
.rec-badge{font-size:10px;background:rgba(124,111,247,.18);border:1px solid rgba(124,111,247,.35);
  color:#a89ff9;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.card-meta{display:flex;gap:5px;flex-wrap:wrap}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.free-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--free)}
.paid-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--paid)}
.cn-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24}
.vpn-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(139,146,184,.08);border:1px solid rgba(139,146,184,.18);color:var(--muted)}
.dead-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);color:#fbbf24;cursor:help}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;flex:1}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border)}
.free-info{font-size:11px;color:var(--free);max-width:175px}
.stars{display:flex;gap:2px}
.s{font-size:10px}.s.on{color:#fbbf24}.s.off{color:var(--border)}
.empty{text-align:center;padding:70px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:44px;margin-bottom:14px}

/* ─── NEWS SECTION ─── */
.news-section{max-width:1200px;margin:0 auto;padding:0 20px 32px}
.news-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:8px}
.news-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.news-title .dot{width:8px;height:8px;border-radius:50%;background:var(--free);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.news-more{font-size:12px;color:var(--accent);text-decoration:none}
.news-more:hover{text-decoration:underline}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.news-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  display:flex;flex-direction:column;gap:6px;transition:border-color .15s
}
.news-card:hover{border-color:rgba(86,207,178,.35)}
.news-date{font-size:11px;color:var(--muted)}
.news-headline{font-size:13px;font-weight:600;color:#fff;line-height:1.5}
.news-body{font-size:12px;color:var(--muted);line-height:1.6}

footer{text-align:center;padding:28px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:8px}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
/* ─── THEME TOGGLE ─── */
.theme-toggle{
  position:absolute;top:18px;right:18px;z-index:5;
  background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:17px;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:border-color .15s,transform .15s
}
.theme-toggle:hover{border-color:var(--accent);transform:translateY(-1px)}

/* ─── CARD ICON BUTTONS（对比 / 复制） ─── */
.card-tools{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.icon-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  min-width:26px;height:26px;padding:0 6px;border-radius:6px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ─── COMPARE BAR（浮动底栏） ─── */
.compare-bar{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(160%);
  background:var(--surface);border:1px solid var(--accent);border-radius:14px;
  padding:11px 16px;display:flex;align-items:center;gap:12px;z-index:200;max-width:92vw;
  box-shadow:0 14px 44px rgba(0,0,0,.45);transition:transform .28s cubic-bezier(.2,.8,.2,1)
}
.compare-bar.show{transform:translateX(-50%) translateY(0)}
.compare-bar-text{font-size:13px;color:var(--text)}
.compare-bar-text b{color:var(--accent2)}
.compare-bar-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.compare-bar-btn:disabled{opacity:.5;cursor:not-allowed}
.compare-bar-clear{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.compare-bar-clear:hover{color:var(--text);border-color:var(--muted)}

/* ─── MODAL（对比表） ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto
}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  max-width:920px;width:100%;padding:22px 22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:24px;
  cursor:pointer;line-height:1;padding:0 4px}
.modal-close:hover{color:var(--text)}
.cmp-scroll{overflow-x:auto}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.cmp-table th,.cmp-table td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.cmp-table thead th{color:var(--accent2);font-weight:700;font-size:14px;border-bottom:1px solid var(--border)}
.cmp-table tbody th{color:var(--muted);font-weight:500;font-size:12px;white-space:nowrap;width:92px}
.cmp-table td{color:var(--text);line-height:1.6}
.cmp-actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}

/* ─── TOAST ─── */
.toast{
  position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);
  background:var(--text);color:var(--bg);padding:9px 18px;border-radius:8px;
  font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:400;transition:all .25s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .stats{gap:18px}.grid{grid-template-columns:1fr}.wf-steps{gap:10px}
  .controls{padding:10px 14px}.workflow-section{padding:24px 16px}
  .theme-toggle{top:14px;right:14px;width:34px;height:34px}
}
</style>
</head>

/* ══════════════════════════════════════
   工作流推荐逻辑
══════════════════════════════════════ */
function matchWorkflow(input) {
  if (!input.trim()) return null;
  const q = input.toLowerCase();
  let best = null, bestScore = 0;
  for (const wf of workflows) {
    let score = 0;
    for (const kw of wf.keywords) {
      if (q.includes(kw.toLowerCase())) {
        score += kw.length >= 3 ? 3 : kw.length === 2 ? 2 : 1;
      }
    }
    if (score > bestScore) { bestScore = score; best = wf; }
  }
  return bestScore > 0 ? best : null;
}

// ── 分享卡片生成器 ──────────────────────────────────────
let currentWf = null;

function generateCard(wf) {
  const W = 800, H = 460;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const c = canvas.getContext('2d');

  // 背景渐变
  const bg = c.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#12142a'); bg.addColorStop(1, '#1e2040');
  c.fillStyle = bg; c.fillRect(0, 0, W, H);

  // 顶部装饰线
  const line = c.createLinearGradient(0, 0, W, 0);
  line.addColorStop(0, '#7c6ff7'); line.addColorStop(1, '#56cfb2');
  c.fillStyle = line; c.fillRect(0, 0, W, 4);

  // 左上角 badge
  c.fillStyle = 'rgba(124,111,247,0.2)';
  roundRect(c, 32, 28, 160, 28, 14); c.fill();
  c.fillStyle = '#a89ff9'; c.font = '13px PingFang SC, sans-serif';
  c.fillText('🧭 AI 工作流推荐', 48, 47);

  // 右上角网站
  c.fillStyle = '#56cfb2'; c.font = '12px PingFang SC, sans-serif';
  c.textAlign = 'right';
  c.fillText('aitools.guide', W - 32, 47);
  c.textAlign = 'left';

  // 工作流标题
  c.fillStyle = '#ffffff';
  c.font = 'bold 26px PingFang SC, sans-serif';
  c.fillText(wf.emoji + ' ' + wf.title, 32, 102);

  // 副标题
  c.fillStyle = '#8b92b8'; c.font = '14px PingFang SC, sans-serif';
  c.fillText(wf.desc, 32, 128);

  // 分割线
  c.strokeStyle = '#2e3250'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(32, 148); c.lineTo(W - 32, 148); c.stroke();

  // 步骤卡片
  const stepW = (W - 64 - (wf.steps.length - 1) * 14) / wf.steps.length;
  wf.steps.forEach((s, i) => {
    const x = 32 + i * (stepW + 14), y = 164;
    // 卡片底色
    c.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(c, x, y, stepW, 220, 10); c.fill();
    c.strokeStyle = 'rgba(124,111,247,0.25)'; c.lineWidth = 1;
    roundRect(c, x, y, stepW, 220, 10); c.stroke();

    // 步骤编号圆圈
    const cx2 = x + 24, cy2 = y + 28;
    c.fillStyle = 'rgba(124,111,247,0.25)';
    c.beginPath(); c.arc(cx2, cy2, 14, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#a89ff9'; c.font = 'bold 12px PingFang SC, sans-serif';
    c.textAlign = 'center';
    c.fillText(i + 1, cx2, cy2 + 4);
    c.textAlign = 'left';

    // 步骤 emoji + action
    c.fillStyle = '#8b92b8'; c.font = '12px PingFang SC, sans-serif';
    c.fillText(s.emoji + ' ' + s.action, x + 12, y + 66);

    // 工具名
    c.fillStyle = '#56cfb2'; c.font = 'bold 15px PingFang SC, sans-serif';
    wrapText(c, s.tool, x + 12, y + 90, stepW - 20, 20);

    // tip 文字（自动换行）
    c.fillStyle = '#6b7296'; c.font = '11px PingFang SC, sans-serif';
    wrapText(c, s.tip, x + 12, y + 120, stepW - 20, 16);
  });

  // 底部
  c.fillStyle = '#3a3f6b';
  c.fillRect(0, H - 44, W, 44);
  c.fillStyle = '#8b92b8'; c.font = '12px PingFang SC, sans-serif';
  c.fillText('🌐 sanhuang520-ship-it.github.io/awesome-chinese-ai-tools', 32, H - 17);
  c.textAlign = 'right';
  c.fillStyle = '#56cfb2';
  c.fillText('免费 · 无广告 · 每日更新', W - 32, H - 17);

  // 下载
  const a = document.createElement('a');
  a.download = `ai-workflow-${wf.id}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split('');
  let line = '', ly = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, ly); line = words[i]; ly += lineH;
      if (ly > y + lineH * 5) { ctx.fillText(line + '…', x, ly); return; }
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, ly);
}

let currentCat='all', onlyFree=false, onlyCN=false, onlyRec=false, query='';
const compareSet = new Set();   // 当前选中对比的工具 _id
const MAX_COMPARE = 4;          // 最多同时对比 4 个

function starsHTML(n){
  let s='';for(let i=1;i<=5;i++)s+=`<span class="s ${i<=n?'on':'off'}">★</span>`;return s;
}
function render(){
  const filtered=tools.filter(t=>{
    if(currentCat!=='all'&&t.cat!==currentCat)return false;
    if(onlyFree&&!t.free)return false;
    if(onlyCN&&!t.cn)return false;
    if(onlyRec&&!t.rec)return false;
    if(query){
      const q=query.toLowerCase();
      if(!t.name.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&
         !t.freeInfo.toLowerCase().includes(q)&&!catMeta[t.cat].label.includes(q))return false;
    }
    return true;
  });
  document.getElementById('result-info').textContent=`显示 ${filtered.length} / ${tools.length} 个工具`;
  const grid=document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div>没有找到匹配的工具</div><div style="font-size:12px;margin-top:6px">换个关键词试试？</div></div>`;
    return;
  }
  const sorted=[...filtered].sort((a,b)=>(b.rec?1:0)-(a.rec?1:0));
  const cm=t=>catMeta[t.cat];
  grid.innerHTML=sorted.map(t=>`
    <div class="card ${t.rec?'recommended':''}">
      <div class="card-header">
        <a class="card-name" href="${t.url}" target="_blank" rel="noopener">${t.name}<span class="ext">↗</span></a>
        <div class="card-tools">
          ${t.rec?'<span class="rec-badge">⭐ 推荐</span>':''}
          <button class="icon-btn cmp-btn ${compareSet.has(t._id)?'active':''}" data-id="${t._id}" title="加入对比">⇄</button>
          <button class="icon-btn copy-btn" data-id="${t._id}" title="复制工具信息">⧉</button>
        </div>
      </div>
      <div class="card-meta">
        <span class="cat-badge" style="background:${cm(t).bg};color:${cm(t).color}">${cm(t).label}</span>
        ${t.free?'<span class="free-b">免费可用</span>':'<span class="paid-b">付费</span>'}
        ${t.cn?'<span class="cn-b">🇨🇳 国产</span>':''}
        ${t.vpn?'<span class="vpn-b">需梯子</span>':''}
        ${(t.linkOk===false && (t.linkFailCount||0)>=2)?`<span class="dead-b" title="链接检测异常·${t.linkCheckedAt||''}·连续${t.linkFailCount}次">⚠️ 链接可能失效</span>`:''}
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-footer">
        <span class="free-info">${t.freeInfo}</span>
        <span class="stars" title="中文支持评级">${starsHTML(t.stars)}</span>
      </div>
    </div>`).join('');
}

document.getElementById('grid').addEventListener('click', e => {

    const id = +cmp.dataset.id;
    if (compareSet.has(id)) {
      compareSet.delete(id);
    } else {
      if (compareSet.size >= MAX_COMPARE) { toast(`最多同时对比 ${MAX_COMPARE} 个工具`); return; }
      compareSet.add(id);

    cmp.classList.toggle('active', compareSet.has(id));

});

function toolToMarkdown(t){
  const tags=[catMeta[t.cat].label, t.free?'免费可用':'付费', t.cn?'国产':'', t.vpn?'需梯子':''].filter(Boolean).join(' · ');

function openCompare(){
  if(compareSet.size<2){toast('至少选择 2 个工具');return;}
  const sel=tools.filter(t=>compareSet.has(t._id));

    ['免费额度', t=>t.freeInfo],
    ['是否免费', t=>t.free?'✅ 免费':'💰 付费'],
    ['国产', t=>t.cn?'🇨🇳 是':'—'],
    ['需梯子', t=>t.vpn?'是':'否'],
    ['中文支持', t=>'★'.repeat(t.stars)+'☆'.repeat(5-t.stars)],
    ['简介', t=>t.desc],
    ['官网', t=>`<a href="${t.url}" target="_blank" rel="noopener" style="color:var(--accent2)">打开 ↗</a>`],
  ];
  const head=`<thead><tr><th></th>${sel.map(t=>`<th>${t.name}</th>`).join('')}</tr></thead>`;
  const body=`<tbody>${rows.map(([label,fn])=>
    `<tr><th>${label}</th>${sel.map(t=>`<td>${fn(t)}</td>`).join('')}</tr>`).join('')}</tbody>`;
  document.getElementById('cmp-table').innerHTML=head+body;
  document.getElementById('cmp-modal').classList.add('show');

function compareToMarkdown(){
  const sel=tools.filter(t=>compareSet.has(t._id));
  const cols=['对比项',...sel.map(t=>t.name)];
  const rows=[
    ['分类',...sel.map(t=>catMeta[t.cat].label)],
    ['免费额度',...sel.map(t=>t.freeInfo)],
    ['是否免费',...sel.map(t=>t.free?'免费':'付费')],
    ['国产',...sel.map(t=>t.cn?'是':'—')],
    ['需梯子',...sel.map(t=>t.vpn?'是':'否')],
    ['中文支持',...sel.map(t=>'★'.repeat(t.stars))],
    ['官网',...sel.map(t=>t.url)],
  ];
  const line=arr=>'| '+arr.join(' | ')+' |';
  return [line(cols), line(cols.map(()=>'---')), ...rows.map(line)].join('\n');
}

/* ══════════════════════════════════════
   复制 + Toast 工具函数
══════════════════════════════════════ */
function copyText(text,msg){
  const done=()=>toast(msg||'已复制');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  }else{fallbackCopy(text,done);}
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');ta.value=text;
  ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);cb&&cb();
}
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

/* ══════════════════════════════════════
   AI 日报 — 动态从 GitHub 读取最新内容
══════════════════════════════════════ */
async function loadNews() {
  const grid = document.getElementById('news-grid');
  const REPO = 'sanhuang520-ship-it/awesome-chinese-ai-tools';
  try {
    // 获取 news/ 目录文件列表
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/news`);
    const files = await res.json();
    // 只取日期格式的 md 文件，按日期倒序取最新 3 篇
    const dated = files
      .filter(f => /^\d{4}-\d{2}-\d{2}\.md$/.test(f.name))
      .sort((a, b) => b.name.localeCompare(a.name))
      .slice(0, 3);
    if (!dated.length) { renderFallback(); return; }
    // 并发拉取文件内容
    const texts = await Promise.all(dated.map(f =>
      fetch(f.download_url).then(r => r.text())
    ));
    grid.innerHTML = texts.map((text, i) => {
      const date = dated[i].name.replace('.md', '');
      // 提取「今日重点」下的前 2 条 bullet
      const lines = text.split('\n');
      const hotIdx = lines.findIndex(l => l.includes('今日重点'));
      const bullets = hotIdx >= 0
        ? lines.slice(hotIdx + 1).filter(l => l.trim().startsWith('-')).slice(0, 2)
        : [];
      const body = bullets.map(l => l.replace(/^-\s*/, '• ')).join('<br>') || '今日暂无更新';
      // 取第一条 bullet 作为标题
      const headline = bullets[0]
        ? bullets[0].replace(/^-\s*\*\*/, '').replace(/\*\*.*/, '').replace(/^-\s*/, '').trim()
        : date + ' 日报';
      return `
        <div class="news-card" onclick="window.open('https://github.com/${REPO}/blob/main/news/${dated[i].name}','_blank')" style="cursor:pointer">
          <div class="news-date">📅 ${date}</div>
          <div class="news-headline">${headline}</div>
          <div class="news-body">${body}</div>
        </div>`;
    }).join('');
  } catch(e) { renderFallback(); }
}

function renderFallback() {
  document.getElementById('news-grid').innerHTML = `
    <div class="news-card">
      <div class="news-date">📅 持续更新中</div>
      <div class="news-headline">AI 日报每日更新</div>
      <div class="news-body">记录模型更新、免费额度变化、新工具上线，每天一篇</div>
    </div>`;
}

loadNews();
