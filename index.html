<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工具导航 — 工作流推荐 · 免费额度大全</title>
<meta name="description" content="输入你的项目，秒得 AI 工作流推荐。收录 100+ 工具，标注免费额度与中文支持。">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
  --accent:#7c6ff7;--accent2:#56cfb2;--text:#e8eaf6;--muted:#8b92b8;
  --free:#34d399;--paid:#f87171;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh}

/* ─── HEADER ─── */
header{
  background:linear-gradient(135deg,#1a1d27 0%,#12142a 50%,#1a1d27 100%);
  border-bottom:1px solid var(--border);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden
}
header::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;background:radial-gradient(ellipse,rgba(124,111,247,.18) 0%,transparent 70%);pointer-events:none}
.badge{display:inline-block;background:rgba(124,111,247,.15);border:1px solid rgba(124,111,247,.4);
  color:#a89ff9;font-size:12px;padding:4px 12px;border-radius:20px;margin-bottom:14px}
h1{font-size:clamp(26px,5vw,46px);font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#a89ff9 55%,#56cfb2 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;line-height:1.2}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:24px}
.stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;text-align:center}

/* ─── WORKFLOW SECTION ─── */
.workflow-section{
  background:linear-gradient(180deg,#12142a 0%,#1a1d27 100%);
  border-bottom:1px solid var(--border);padding:36px 24px
}
.wf-inner{max-width:720px;margin:0 auto}
.wf-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;color:#fff}
.wf-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:20px}
.wf-input-wrap{position:relative;margin-bottom:14px}
.wf-input{
  width:100%;padding:14px 120px 14px 18px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:12px;color:var(--text);
  font-size:15px;outline:none;transition:border-color .2s
}
.wf-input:focus{border-color:var(--accent)}
.wf-input::placeholder{color:var(--muted)}
.wf-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;color:#fff;padding:8px 18px;
  border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s
}
.wf-btn:hover{opacity:.85}
.wf-examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.wf-tag{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.wf-tag:hover{border-color:var(--accent);color:var(--accent)}

/* ─── WORKFLOW RESULT ─── */
.wf-result{margin-top:24px;display:none}
.wf-result.show{display:block}
.wf-result-title{
  font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;
  display:flex;align-items:center;gap:8px
}
.wf-result-desc{font-size:13px;color:var(--muted);margin-bottom:18px}
.wf-steps{display:flex;flex-direction:column;gap:12px}
.wf-step{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;transition:border-color .15s
}
.wf-step:hover{border-color:rgba(124,111,247,.4)}
.wf-step-num{
  min-width:28px;height:28px;border-radius:50%;
  background:rgba(124,111,247,.2);border:1px solid rgba(124,111,247,.4);
  color:#a89ff9;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px
}
.wf-step-body{flex:1}
.wf-step-action{font-size:13px;color:var(--muted);margin-bottom:4px}
.wf-step-tool{font-size:15px;font-weight:600}
.wf-step-tool a{color:var(--accent2);text-decoration:none}
.wf-step-tool a:hover{text-decoration:underline}
.wf-step-tip{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6;
  background:rgba(255,255,255,.03);border-radius:6px;padding:6px 10px;border-left:2px solid var(--border)}
.wf-nomatch{
  text-align:center;padding:24px;color:var(--muted);font-size:14px;
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border)
}
.wf-clear{margin-top:14px;background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.wf-clear:hover{border-color:var(--muted);color:var(--text)}

/* ─── CONTROLS ─── */
.controls{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.93);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 24px
}
.search-wrap{max-width:500px;margin:0 auto 12px;position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
#search{
  width:100%;padding:10px 16px 10px 36px;background:var(--surface2);
  border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
.filter-btn{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap
}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.quick-filters{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.quick-btn{
  padding:4px 11px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.quick-btn:hover{color:var(--text);border-color:var(--muted)}
.quick-btn.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2)}

/* ─── GRID ─── */
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.result-info{font-size:12px;color:var(--muted);margin-bottom:14px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:14px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;display:flex;flex-direction:column;gap:9px;transition:transform .15s,border-color .15s,box-shadow .15s
}
.card:hover{transform:translateY(-2px);border-color:rgba(124,111,247,.45);box-shadow:0 8px 28px rgba(124,111,247,.1)}
.card.recommended{border-color:rgba(124,111,247,.3);background:linear-gradient(135deg,#1a1d27,#1e1f35)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:15px;font-weight:600;color:#fff;text-decoration:none;display:flex;align-items:center;gap:5px}
.card-name:hover{color:#a89ff9}
.card-name .ext{font-size:10px;color:var(--muted)}
.rec-badge{font-size:10px;background:rgba(124,111,247,.18);border:1px solid rgba(124,111,247,.35);
  color:#a89ff9;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.card-meta{display:flex;gap:5px;flex-wrap:wrap}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.free-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--free)}
.paid-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--paid)}
.cn-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24}
.vpn-b{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(139,146,184,.08);border:1px solid rgba(139,146,184,.18);color:var(--muted)}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;flex:1}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border)}
.free-info{font-size:11px;color:var(--free);max-width:175px}
.stars{display:flex;gap:2px}
.s{font-size:10px}.s.on{color:#fbbf24}.s.off{color:var(--border)}
.empty{text-align:center;padding:70px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:44px;margin-bottom:14px}

/* ─── NEWS SECTION ─── */
.news-section{max-width:1200px;margin:0 auto;padding:0 20px 32px}
.news-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:8px}
.news-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.news-title .dot{width:8px;height:8px;border-radius:50%;background:var(--free);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.news-more{font-size:12px;color:var(--accent);text-decoration:none}
.news-more:hover{text-decoration:underline}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.news-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  display:flex;flex-direction:column;gap:6px;transition:border-color .15s
}
.news-card:hover{border-color:rgba(86,207,178,.35)}
.news-date{font-size:11px;color:var(--muted)}
.news-headline{font-size:13px;font-weight:600;color:#fff;line-height:1.5}
.news-body{font-size:12px;color:var(--muted);line-height:1.6}

footer{text-align:center;padding:28px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:8px}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:600px){
  .stats{gap:18px}.grid{grid-template-columns:1fr}.wf-steps{gap:10px}
  .controls{padding:10px 14px}.workflow-section{padding:24px 16px}
}
</style>
</head>

/* ══════════════════════════════════════
   工作流推荐逻辑
══════════════════════════════════════ */
function matchWorkflow(input) {
  if (!input.trim()) return null;
  const q = input.toLowerCase();
  let best = null, bestScore = 0;
  for (const wf of workflows) {
    let score = 0;
    for (const kw of wf.keywords) {
      if (q.includes(kw.toLowerCase())) {
        score += kw.length >= 3 ? 3 : kw.length === 2 ? 2 : 1;
      }
    }
    if (score > bestScore) { bestScore = score; best = wf; }
  }
  return bestScore > 0 ? best : null;
}

function showWorkflow(wf) {
  const result = document.getElementById('wf-result');
  document.getElementById('wf-rtitle').innerHTML = `${wf.emoji} ${wf.title}`;
  document.getElementById('wf-rdesc').textContent = wf.desc;
  document.getElementById('wf-steps').innerHTML = wf.steps.map((s, i) => `
    <div class="wf-step">
      <div class="wf-step-num">${i+1}</div>
      <div class="wf-step-body">
        <div class="wf-step-action">${s.emoji} ${s.action}</div>
        <div class="wf-step-tool">推荐工具：<a href="${s.url}" target="_blank" rel="noopener">${s.tool} ↗</a></div>
        <div class="wf-step-tip">💡 ${s.tip}</div>
      </div>
    </div>`).join('');
  result.classList.add('show');
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showNoMatch() {
  const result = document.getElementById('wf-result');
  document.getElementById('wf-rtitle').textContent = '🤔 没找到完全匹配的场景';
  document.getElementById('wf-rdesc').textContent = '试试下面的快速选择，或者把你的任务描述得更具体一些';
  document.getElementById('wf-steps').innerHTML = `<div class="wf-nomatch">例如：「写毕业论文」「开发一个网站」「做短视频」「企业内部知识库」</div>`;
  result.classList.add('show');
}

document.getElementById('wf-btn').addEventListener('click', () => {
  const q = document.getElementById('wf-input').value;
  const wf = matchWorkflow(q);
  wf ? showWorkflow(wf) : showNoMatch();
});
document.getElementById('wf-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('wf-btn').click();
});
document.querySelectorAll('.wf-tag').forEach(t => {
  t.addEventListener('click', () => {
    document.getElementById('wf-input').value = t.dataset.q;
    const wf = matchWorkflow(t.dataset.q);
    wf ? showWorkflow(wf) : showNoMatch();
  });
});
document.getElementById('wf-clear').addEventListener('click', () => {
  document.getElementById('wf-result').classList.remove('show');
  document.getElementById('wf-input').value = '';
});

/* ══════════════════════════════════════
   工具网格渲染
══════════════════════════════════════ */
let currentCat='all', onlyFree=false, onlyCN=false, onlyRec=false, query='';

function starsHTML(n){
  let s='';for(let i=1;i<=5;i++)s+=`<span class="s ${i<=n?'on':'off'}">★</span>`;return s;
}
function render(){
  const filtered=tools.filter(t=>{
    if(currentCat!=='all'&&t.cat!==currentCat)return false;
    if(onlyFree&&!t.free)return false;
    if(onlyCN&&!t.cn)return false;
    if(onlyRec&&!t.rec)return false;
    if(query){
      const q=query.toLowerCase();
      if(!t.name.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&
         !t.freeInfo.toLowerCase().includes(q)&&!catMeta[t.cat].label.includes(q))return false;
    }
    return true;
  });
  document.getElementById('result-info').textContent=`显示 ${filtered.length} / ${tools.length} 个工具`;
  const grid=document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div>没有找到匹配的工具</div><div style="font-size:12px;margin-top:6px">换个关键词试试？</div></div>`;
    return;
  }
  const sorted=[...filtered].sort((a,b)=>(b.rec?1:0)-(a.rec?1:0));
  const cm=t=>catMeta[t.cat];
  grid.innerHTML=sorted.map(t=>`
    <div class="card ${t.rec?'recommended':''}">
      <div class="card-header">
        <a class="card-name" href="${t.url}" target="_blank" rel="noopener">${t.name}<span class="ext">↗</span></a>
        ${t.rec?'<span class="rec-badge">⭐ 推荐</span>':''}
      </div>
      <div class="card-meta">
        <span class="cat-badge" style="background:${cm(t).bg};color:${cm(t).color}">${cm(t).label}</span>
        ${t.free?'<span class="free-b">免费可用</span>':'<span class="paid-b">付费</span>'}
        ${t.cn?'<span class="cn-b">🇨🇳 国产</span>':''}
        ${t.vpn?'<span class="vpn-b">需梯子</span>':''}
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-footer">
        <span class="free-info">${t.freeInfo}</span>
        <span class="stars" title="中文支持评级">${starsHTML(t.stars)}</span>
      </div>
    </div>`).join('');
}

document.getElementById('cat-filters').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentCat=btn.dataset.cat;render();
});
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.trim();render();});
document.getElementById('btn-free').addEventListener('click',function(){onlyFree=!onlyFree;this.classList.toggle('active',onlyFree);render();});
document.getElementById('btn-cn').addEventListener('click',function(){onlyCN=!onlyCN;this.classList.toggle('active',onlyCN);render();});
document.getElementById('btn-rec').addEventListener('click',function(){onlyRec=!onlyRec;this.classList.toggle('active',onlyRec);render();});
