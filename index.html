// ── 状态 ──
let currentCat = 'all';
let onlyFree   = false;
let onlyCN     = false;
let onlyRec    = false;
let query      = '';

// ── 渲染 ──
function stars(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    s += `<span class="star ${i<=n?'on':'off'}">★</span>`;
  }
  return s;
}

function render() {
  const filtered = tools.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (onlyFree && !t.free) return false;
    if (onlyCN   && !t.cn)   return false;
    if (onlyRec  && !t.rec)  return false;
    if (query) {
      const q = query.toLowerCase();
      if (!t.name.toLowerCase().includes(q) &&
          !t.desc.toLowerCase().includes(q) &&
          !t.freeInfo.toLowerCase().includes(q) &&
          !catMeta[t.cat].label.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('result-info').textContent =
    `显示 ${filtered.length} / ${tools.length} 个工具`;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>没有找到匹配的工具</div><div style="font-size:12px;margin-top:8px">换个关键词试试？</div></div>`;
    return;
  }

  // 推荐的排在前面
  const sorted = [...filtered].sort((a,b) => (b.rec?1:0)-(a.rec?1:0));

  grid.innerHTML = sorted.map(t => {
    const cm = catMeta[t.cat];
    return `
    <div class="card ${t.rec?'recommended':''}">
      <div class="card-header">
        <a class="card-name" href="${t.url}" target="_blank" rel="noopener">
          ${t.name}
          <span class="ext-icon">↗</span>
        </a>
        ${t.rec ? '<span class="recommended-badge">⭐ 推荐</span>' : ''}
      </div>
      <div class="card-meta">
        <span class="cat-badge" style="background:${cm.bg};color:${cm.color}">${cm.label}</span>
        ${t.free ? '<span class="free-badge">免费可用</span>' : '<span class="paid-badge">付费</span>'}
        ${t.cn   ? '<span class="cn-badge">🇨🇳 国产</span>' : ''}
        ${t.vpn  ? '<span class="vpn-badge">需梯子</span>' : ''}
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-footer">
        <span class="free-info">${t.freeInfo}</span>
        <span class="chinese-stars" title="中文支持评级">${stars(t.stars)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 事件 ──
document.getElementById('cat-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

function toggleQuick(btn, flag, setter) {
  document.getElementById(btn).addEventListener('click', function() {
    setter(!flag);
    flag = !flag;
    this.classList.toggle('active', flag);
    render();
  });
}

let freeFlag=false, cnFlag=false, recFlag=false;
document.getElementById('btn-free').addEventListener('click', function(){
  freeFlag=!freeFlag; onlyFree=freeFlag;
  this.classList.toggle('active',freeFlag); render();
});
document.getElementById('btn-cn').addEventListener('click', function(){
  cnFlag=!cnFlag; onlyCN=cnFlag;
  this.classList.toggle('active',cnFlag); render();
});
document.getElementById('btn-rec').addEventListener('click', function(){
  recFlag=!recFlag; onlyRec=recFlag;
  this.classList.toggle('active',recFlag); render();
});

// 初始化
document.getElementById('total-count').textContent = tools.length + '+';
render();
</script>
