/* ══════════════════════════════════════
   CSS 变量 & 主题
══════════════════════════════════════ */
:root{
  --bg:#0d0f18;--surface:#141720;--surface2:#1c2030;--surface3:#232840;
  --border:#252a42;--border2:#2e3558;
  --accent:#7c6ff7;--accent2:#56cfb2;--accent3:#f472b6;
  --text:#e8eaf6;--text2:#b0b7d8;--muted:#6b7296;
  --free:#34d399;--paid:#f87171;
  --r:10px;--r2:14px;
  --navbar-h:56px;
}
[data-theme="light"]{
  --bg:#f4f5fb;--surface:#ffffff;--surface2:#eceef8;--surface3:#e2e5f5;
  --border:#dde0f0;--border2:#c8cce8;
  --accent:#5f50e8;--accent2:#0f9471;--accent3:#db2777;
  --text:#141720;--text2:#3d4468;--muted:#7880a8;
  --free:#0a7c4f;--paid:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .2s,color .2s;
}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--navbar-h);
  background:rgba(13,15,24,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 20px;
}
[data-theme="light"] .navbar{background:rgba(244,245,251,.88)}
.nav-logo{
  font-size:15px;font-weight:700;color:var(--text);
  white-space:nowrap;flex-shrink:0;letter-spacing:-.3px
}
.nav-logo span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.nav-search-wrap{flex:1;max-width:360px;position:relative}
.nav-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
#search{
  width:100%;padding:8px 14px 8px 32px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;outline:none;
  transition:border-color .15s
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.nav-chips{display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-chip{
  font-size:11px;color:var(--muted);padding:3px 8px;
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  white-space:nowrap;
}
.nav-chip b{color:var(--accent);font-weight:700}
.nav-actions{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0}
.nav-quick-btn{
  font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap
}
.nav-quick-btn:hover{color:var(--text);border-color:var(--muted)}
.nav-quick-btn.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2)}
.theme-toggle{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s
}
.theme-toggle:hover{border-color:var(--accent)}

/* ══════════════════════════════════════
   HERO SECTION
══════════════════════════════════════ */
.hero{
  padding:calc(var(--navbar-h) + 28px) 20px 0;
  max-width:1200px;margin:0 auto;
}
.hero-label{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.hero-label-text{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.hero-label-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-label-sub{font-size:11px;color:var(--muted)}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:0;
}
@media(max-width:760px){.hero-grid{grid-template-columns:1fr}}
@media(min-width:761px) and (max-width:980px){.hero-grid{grid-template-columns:1fr 1fr}}

/* 主卡片（第一张，稍大） */
.hero-card{
  position:relative;overflow:hidden;
  border:1px solid var(--border);border-radius:var(--r2);
  padding:20px;
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;
  text-decoration:none;
}
.hero-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.hero-card::before{
  content:'';position:absolute;inset:0;opacity:.07;
  background:var(--hero-grad,linear-gradient(135deg,#7c6ff7,#56cfb2));
  pointer-events:none;
}
.hero-card:hover::before{opacity:.13}

/* 按分类给 hero 卡片着色 */
.hero-card[data-cat="llm"]      {--hero-grad:linear-gradient(135deg,#7c6ff7,#56cfb2);border-color:rgba(124,111,247,.25)}
.hero-card[data-cat="image"]    {--hero-grad:linear-gradient(135deg,#f472b6,#fb923c);border-color:rgba(244,114,182,.25)}
.hero-card[data-cat="video"]    {--hero-grad:linear-gradient(135deg,#fb923c,#fbbf24);border-color:rgba(251,146,60,.25)}
.hero-card[data-cat="code"]     {--hero-grad:linear-gradient(135deg,#34d399,#60a5fa);border-color:rgba(52,211,153,.25)}
.hero-card[data-cat="writing"]  {--hero-grad:linear-gradient(135deg,#60a5fa,#a78bfa);border-color:rgba(96,165,250,.25)}
.hero-card[data-cat="translate"]{--hero-grad:linear-gradient(135deg,#a3e635,#56cfb2);border-color:rgba(163,230,53,.25)}
.hero-card[data-cat="voice"]    {--hero-grad:linear-gradient(135deg,#e879f9,#7c6ff7);border-color:rgba(232,121,249,.25)}
.hero-card[data-cat="search"]   {--hero-grad:linear-gradient(135deg,#38bdf8,#56cfb2);border-color:rgba(56,189,248,.25)}
.hero-card[data-cat="productivity"]{--hero-grad:linear-gradient(135deg,#fbbf24,#fb923c);border-color:rgba(251,191,36,.25)}
.hero-card[data-cat="agent"]    {--hero-grad:linear-gradient(135deg,#56cfb2,#34d399);border-color:rgba(86,207,178,.25)}

.hero-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hero-card-name{
  font-size:20px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;line-height:1.2
}
.hero-card-name .hero-ext{font-size:13px;color:var(--muted);font-weight:400}
.hero-card-rank{
  font-size:11px;font-weight:700;color:var(--accent);
  background:rgba(124,111,247,.12);border:1px solid rgba(124,111,247,.25);
  padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap
}
.hero-card-badges{display:flex;gap:5px;flex-wrap:wrap}
.hero-card-desc{font-size:13px;color:var(--text2);line-height:1.7;flex:1}
.hero-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--border);margin-top:auto
}
.hero-free-info{font-size:11px;color:var(--free);font-weight:500}
.hero-cta{
  font-size:12px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;
}
.hero-cta:hover{opacity:.8}
.hero-card-actions{display:flex;gap:5px}

/* ══════════════════════════════════════
   CATEGORY TABS (sticky below navbar)
══════════════════════════════════════ */
.cat-tabs-wrap{
  position:sticky;top:var(--navbar-h);z-index:100;
  background:rgba(13,15,24,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
}
[data-theme="light"] .cat-tabs-wrap{background:rgba(244,245,251,.92)}
.cat-tabs{
  max-width:1200px;margin:0 auto;
  display:flex;gap:0;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  padding:12px 16px;
  font-size:13px;color:var(--muted);
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0
}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}

/* ══════════════════════════════════════
   TOOL LIST (紧凑行)
══════════════════════════════════════ */
.browse{max-width:1200px;margin:0 auto;padding:0 20px 32px}
.list-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 10px;
}
.list-info{font-size:12px;color:var(--muted)}
.list-view-toggle{display:flex;gap:4px}
.view-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:4px 8px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .15s
}
.view-btn.active,.view-btn:hover{border-color:var(--accent);color:var(--accent)}

.tool-list{display:flex;flex-direction:column;gap:2px}
.tool-row{
  display:grid;
  grid-template-columns:32px 1fr auto auto;
  align-items:center;gap:12px;
  padding:11px 14px;
  background:var(--surface);border:1px solid transparent;border-radius:var(--r);
  transition:background .12s,border-color .12s;cursor:pointer
}
.tool-row:hover{background:var(--surface2);border-color:var(--border)}
.row-rank{
  font-size:12px;font-weight:700;color:var(--muted);
  text-align:center;flex-shrink:0
}
.row-rank.top{color:var(--accent)}
.row-main{display:flex;flex-direction:column;gap:3px;min-width:0}
.row-name-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-name{
  font-size:14px;font-weight:600;color:var(--text);text-decoration:none;
  transition:color .12s;white-space:nowrap
}
.row-name:hover{color:var(--accent)}
.row-ext{font-size:10px;color:var(--muted)}
.row-desc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-badges{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.row-actions{display:flex;gap:5px;flex-shrink:0}

/* badge 通用 */
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.b-cat{background:var(--cat-bg,rgba(124,111,247,.12));color:var(--cat-c,#a89ff9)}
.b-free{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:var(--free)}
.b-paid{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--paid)}
.b-cn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18);color:#fbbf24}
.b-vpn{background:rgba(107,114,150,.08);border:1px solid rgba(107,114,150,.18);color:var(--muted)}
.b-dead{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);color:#fbbf24;cursor:help}
.b-rec{background:rgba(124,111,247,.12);border:1px solid rgba(124,111,247,.22);color:#a89ff9}

.stars-sm{font-size:10px;color:var(--muted);white-space:nowrap}
.stars-sm .on{color:#fbbf24}

/* icon 操作按钮 */
.icon-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  min-width:26px;height:26px;padding:0 5px;border-radius:6px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 空状态 */
.list-empty{
  text-align:center;padding:60px 20px;color:var(--muted);
  grid-column:1/-1
}
.list-empty-icon{font-size:40px;margin-bottom:12px}

/* ══════════════════════════════════════
   NEWS SECTION
══════════════════════════════════════ */
.news-section{
  max-width:1200px;margin:0 auto;padding:0 20px 48px;
}
.news-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:14px 0;border-top:1px solid var(--border);margin-bottom:0;
  user-select:none
}
.news-toggle-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.news-dot{width:7px;height:7px;border-radius:50%;background:var(--free);animation:pulse 2s infinite}
.news-toggle-arrow{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s}
.news-toggle.open .news-toggle-arrow{transform:rotate(180deg)}
.news-more{font-size:12px;color:var(--accent);text-decoration:none;margin-left:12px}
.news-more:hover{text-decoration:underline}
.news-body{display:none;padding-top:14px}
.news-body.show{display:block}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.news-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;flex-direction:column;gap:5px;
  transition:border-color .15s;cursor:pointer
}
.news-card:hover{border-color:rgba(86,207,178,.35)}
.news-date{font-size:11px;color:var(--muted)}
.news-headline{font-size:13px;font-weight:600;color:var(--text);line-height:1.5}
.news-body-text{font-size:12px;color:var(--muted);line-height:1.6}

/* ══════════════════════════════════════
   WORKFLOW DRAWER
══════════════════════════════════════ */
.wf-fab{
  position:fixed;right:20px;bottom:24px;z-index:150;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;padding:10px 18px;border-radius:50px;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 24px rgba(124,111,247,.4);
  display:flex;align-items:center;gap:7px;
  transition:transform .15s,box-shadow .15s
}
.wf-fab:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,111,247,.5)}
.wf-fab-icon{font-size:16px}

.wf-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s
}
.wf-overlay.show{opacity:1;pointer-events:auto}

.wf-drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:310;
  width:min(480px,100vw);
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;overflow:hidden
}
.wf-drawer.show{transform:translateX(0)}

.wf-drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0
}
.wf-drawer-title{font-size:16px;font-weight:700;color:var(--text)}
.wf-drawer-close{
  background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px
}
.wf-drawer-close:hover{background:var(--surface2);color:var(--text)}
.wf-drawer-body{flex:1;overflow-y:auto;padding:20px}

.wf-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.wf-input-wrap{position:relative;margin-bottom:12px}
.wf-input{
  width:100%;padding:12px 100px 12px 16px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:10px;color:var(--text);
  font-size:14px;outline:none;transition:border-color .2s
}
.wf-input:focus{border-color:var(--accent)}
.wf-input::placeholder{color:var(--muted)}
.wf-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;color:#fff;padding:7px 14px;
  border-radius:7px;font-size:13px;cursor:pointer;font-weight:600
}
.wf-examples{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.wf-tag{
  padding:4px 11px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.wf-tag:hover{border-color:var(--accent);color:var(--accent)}

.wf-result{margin-top:20px;display:none}
.wf-result.show{display:block}
.wf-result-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.wf-result-desc{font-size:12px;color:var(--muted);margin-bottom:14px}
.wf-steps{display:flex;flex-direction:column;gap:10px}
.wf-step{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px
}
.wf-step-num{
  min-width:26px;height:26px;border-radius:50%;
  background:rgba(124,111,247,.18);border:1px solid rgba(124,111,247,.35);
  color:#a89ff9;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.wf-step-body{flex:1}
.wf-step-action{font-size:12px;color:var(--muted);margin-bottom:3px}
.wf-step-tool{font-size:14px;font-weight:600}
.wf-step-tool a{color:var(--accent2);text-decoration:none}
.wf-step-tool a:hover{text-decoration:underline}
.wf-step-tip{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6;
  background:rgba(255,255,255,.03);border-radius:5px;padding:5px 9px;border-left:2px solid var(--border)}
.wf-nomatch{text-align:center;padding:20px;color:var(--muted);font-size:13px;
  background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.wf-actions{display:flex;gap:8px;margin-top:12px}
.wf-clear{background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.wf-clear:hover{border-color:var(--muted);color:var(--text)}

/* ══════════════════════════════════════
   COMPARE BAR
══════════════════════════════════════ */
.compare-bar{
  position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(160%);
  background:var(--surface);border:1px solid var(--accent);border-radius:14px;
  padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:200;max-width:92vw;
  box-shadow:0 14px 44px rgba(0,0,0,.5);transition:transform .28s cubic-bezier(.2,.8,.2,1)
}
.compare-bar.show{transform:translateX(-50%) translateY(0)}
.compare-bar-text{font-size:13px;color:var(--text)}
.compare-bar-text b{color:var(--accent2)}
.compare-bar-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer
}
.compare-bar-btn:disabled{opacity:.45;cursor:not-allowed}
.compare-bar-clear{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer}
.compare-bar-clear:hover{color:var(--text);border-color:var(--muted)}

/* ══════════════════════════════════════
   COMPARE MODAL
══════════════════════════════════════ */
.modal-overlay{

.modal{

let currentCat = 'all', onlyFree = false, onlyCN = false, onlyRec = false, query = '';
const compareSet = new Set();
const MAX_COMPARE = 4;

/* ══════════════════════════════════════
   渲染 — Hero 精选卡片
══════════════════════════════════════ */
function renderHero() {
  const heroGrid = document.getElementById('hero-grid');
  // 取当前筛选条件下 rec:true 的工具，最多 3 个
  const recTools = tools.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (onlyFree && !t.free) return false;
    if (onlyCN && !t.cn) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!t.name.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return false;
    }
    return t.rec;
  }).slice(0, 3);

  if (!recTools.length) { heroGrid.innerHTML = ''; return; }

  const cm = t => catMeta[t.cat] || {label:'',color:'#8b92b8',bg:'rgba(139,146,184,.12)'};
  heroGrid.innerHTML = recTools.map((t, i) => `
    <a class="hero-card" data-cat="${t.cat}" href="${t.url}" target="_blank" rel="noopener">
      <div class="hero-card-top">
        <div class="hero-card-name">${t.name}<span class="hero-ext">↗</span></div>
        <span class="hero-card-rank">${i === 0 ? '🏆 编辑首选' : `✦ 精选 #${i+1}`}</span>
      </div>
      <div class="hero-card-badges">
        <span class="badge b-cat" style="--cat-bg:${cm(t).bg};--cat-c:${cm(t).color}">${cm(t).label}</span>
        ${t.free ? '<span class="badge b-free">免费可用</span>' : '<span class="badge b-paid">付费</span>'}
        ${t.cn ? '<span class="badge b-cn">🇨🇳 国产</span>' : ''}
        ${t.vpn ? '<span class="badge b-vpn">需梯子</span>' : ''}
      </div>
      <div class="hero-card-desc">${t.desc}</div>
      <div class="hero-card-footer">
        <span class="hero-free-info">${t.freeInfo}</span>
        <span class="hero-cta">立即体验 →</span>
      </div>
    </a>`).join('');
}

/* ══════════════════════════════════════
   渲染 — 工具列表行
══════════════════════════════════════ */
function starsHTML(n) {
  return '<span class="stars-sm">' +
    Array.from({length:5}, (_,i) => `<span class="${i<n?'on':''}">★</span>`).join('') +
    '</span>';
}

function renderList() {
  const filtered = tools.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (onlyFree && !t.free) return false;
    if (onlyCN && !t.cn) return false;
    if (onlyRec && !t.rec) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!t.name.toLowerCase().includes(q) &&
          !t.desc.toLowerCase().includes(q) &&
          !t.freeInfo.toLowerCase().includes(q) &&
          !(catMeta[t.cat]?.label || '').includes(q)) return false;
    }
    return true;
  });

  document.getElementById('list-info').textContent =
    `显示 ${filtered.length} / ${tools.length} 个工具`;

  const list = document.getElementById('tool-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty">
      <div class="list-empty-icon">🔍</div>
      <div>没有找到匹配的工具，换个关键词试试</div></div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b) => (b.rec?1:0)-(a.rec?1:0));
  const cm = t => catMeta[t.cat] || {label:'',color:'#8b92b8',bg:'rgba(139,146,184,.12)'};
  const isDead = t => t.linkOk === false && (t.linkFailCount||0) >= 2;

  list.innerHTML = sorted.map((t, i) => `
    <div class="tool-row" data-id="${t._id}">
      <span class="row-rank ${i<3?'top':''}">${i+1}</span>
      <div class="row-main">
        <div class="row-name-line">
          <a class="row-name" href="${t.url}" target="_blank" rel="noopener"
             onclick="event.stopPropagation()">${t.name}<span class="row-ext"> ↗</span></a>
          ${t.rec ? '<span class="badge b-rec">⭐ 精选</span>' : ''}
          ${isDead(t) ? `<span class="badge b-dead" title="链接异常·${t.linkCheckedAt}·连续${t.linkFailCount}次">⚠️ 链接可能失效</span>` : ''}
        </div>
        <div class="row-desc">${t.freeInfo}</div>
      </div>
      <div class="row-badges">
        <span class="badge b-cat" style="--cat-bg:${cm(t).bg};--cat-c:${cm(t).color}">${cm(t).label}</span>
        ${t.free ? '<span class="badge b-free">免费</span>' : '<span class="badge b-paid">付费</span>'}
        ${t.cn ? '<span class="badge b-cn">🇨🇳</span>' : ''}
        ${t.vpn ? '<span class="badge b-vpn">梯子</span>' : ''}
        ${starsHTML(t.stars)}
      </div>
      <div class="row-actions">
        <button class="icon-btn cmp-btn ${compareSet.has(t._id)?'active':''}" data-id="${t._id}" title="加入对比" onclick="event.stopPropagation()">⇄</button>
        <button class="icon-btn copy-btn" data-id="${t._id}" title="复制信息" onclick="event.stopPropagation()">⧉</button>
      </div>
    </div>`).join('');
}

function render() {
  renderHero();
  renderList();
}

/* ══════════════════════════════════════
   加载工具数据
══════════════════════════════════════ */
async function loadTools() {
  try {
    const res = await fetch('data/tools.json', {cache:'no-cache'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    catMeta = data.categories || {};
    tools = (data.tools || []).map((t,i) => ({...t, _id:i}));
    document.getElementById('tc').textContent = tools.length;
    render();
  } catch(e) {
    document.getElementById('tool-list').innerHTML =
      `<div class="list-empty"><div class="list-empty-icon">⚠️</div>
       <div>工具数据加载失败</div>
       <div style="font-size:12px;margin-top:6px">请在
       <a href="https://sanhuang520-ship-it.github.io/awesome-chinese-ai-tools/" style="color:var(--accent)">线上站点</a>查看</div></div>`;
    console.error('加载 tools.json 失败：', e);
  }
}

function toolToMarkdown(t) {
  const cm = catMeta[t.cat] || {};
  const tags = [cm.label, t.free?'免费':'付费', t.cn?'国产':'', t.vpn?'需梯子':''].filter(Boolean).join(' · ');
  return `**${t.name}** — ${tags}\n额度：${t.freeInfo}｜中文支持：${'★'.repeat(t.stars)}\n${t.desc}\n${t.url}`;
}
function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  document.getElementById('cmp-count').textContent = compareSet.size;
  document.getElementById('cmp-open').disabled = compareSet.size < 2;
  bar.classList.toggle('show', compareSet.size > 0);
}

  compareSet.clear();

function openCompare() {
  if (compareSet.size < 2) { toast('至少选择 2 个工具'); return; }
  const sel = tools.filter(t => compareSet.has(t._id));
  const cm = t => catMeta[t.cat] || {};
  const rows = [
    ['分类', t => cm(t).label||''],
    ['免费额度', t => t.freeInfo],
    ['是否免费', t => t.free ? '✅ 免费' : '💰 付费'],
    ['国产', t => t.cn ? '🇨🇳 是' : '—'],
    ['需梯子', t => t.vpn ? '是' : '否'],
    ['中文支持', t => '★'.repeat(t.stars)+'☆'.repeat(5-t.stars)],
    ['简介', t => t.desc],
    ['官网', t => `<a href="${t.url}" target="_blank" rel="noopener" style="color:var(--accent2)">打开 ↗</a>`],
  ];
  const head = `<thead><tr><th></th>${sel.map(t=>`<th>${t.name}</th>`).join('')}</tr></thead>`;
  const body = `<tbody>${rows.map(([label,fn])=>
    `<tr><th>${label}</th>${sel.map(t=>`<td>${fn(t)}</td>`).join('')}</tr>`).join('')}</tbody>`;
  document.getElementById('cmp-table').innerHTML = head + body;
  document.getElementById('cmp-modal').classList.add('show');
}
function compareToMarkdown() {
  const sel = tools.filter(t => compareSet.has(t._id));
  const cm = t => catMeta[t.cat] || {};
  const cols = ['对比项', ...sel.map(t=>t.name)];
  const rows = [
    ['分类', ...sel.map(t=>cm(t).label||'')],
    ['免费额度', ...sel.map(t=>t.freeInfo)],
    ['是否免费', ...sel.map(t=>t.free?'免费':'付费')],
    ['国产', ...sel.map(t=>t.cn?'是':'—')],
    ['需梯子', ...sel.map(t=>t.vpn?'是':'否')],
    ['中文支持', ...sel.map(t=>'★'.repeat(t.stars))],
    ['官网', ...sel.map(t=>t.url)],
  ];
  const line = arr => '| '+arr.join(' | ')+' |';
  return [line(cols), line(cols.map(()=>'---')), ...rows.map(line)].join('\n');
}

/* ══════════════════════════════════════
   复制 + Toast
══════════════════════════════════════ */
function copyText(text, msg) {
  const done = () => toast(msg||'已复制');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta); cb?.();
}
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function matchWorkflow(input) {
  if (!input.trim()) return null;
  const q = input.toLowerCase();
  let best = null, bestScore = 0;
  for (const wf of workflows) {
    let score = 0;
    for (const kw of wf.keywords) {
      if (q.includes(kw.toLowerCase()))
        score += kw.length >= 3 ? 3 : kw.length === 2 ? 2 : 1;
    }
    if (score > bestScore) { bestScore = score; best = wf; }
  }
  return bestScore > 0 ? best : null;
}

  document.getElementById('wf-rtitle').innerHTML = `${wf.emoji} ${wf.title}`;
  document.getElementById('wf-rdesc').textContent = wf.desc;

async function loadChangelog() {
  const view = document.getElementById('changelog-view');
  view.dataset.loaded = '1';
  view.innerHTML = `
    <div class="cl-header">
      <div class="cl-title">📋 免费额度变化追踪</div>
      <div class="cl-subtitle">记录各工具免费层的调整历史 · 额度变化时此处优先更新<br>防止被悄悄缩减的免费额度坑到</div>
    </div>
    <div class="cl-list" id="cl-list"><div style="color:var(--muted);padding:20px 0">加载中…</div></div>`;
  const REPO = 'sanhuang520-ship-it/awesome-chinese-ai-tools';
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/changelog/free-tiers.md`, {cache:'no-cache'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    renderChangelog(await res.text());
  } catch(e) {
    document.getElementById('cl-list').innerHTML = '<div style="color:var(--muted)">加载失败，请刷新重试</div>';
  }
}

function renderChangelog(md) {
  const lines = md.split('\n');
  const items = [];
  let cur = null;
  for (const raw of lines) {
    const line = raw.trimEnd();
    const m = line.match(/^##\s+(\d{4}-\d{2}-\d{2})\s+·\s+(.+)/);
    if (m) {
      if (cur) items.push(cur);
      cur = { date: m[1], tool: m[2].trim(), change: '', tag: '' };
      continue;
    }
    if (!cur) continue;
    if (line.match(/^tag:\s*/)) { cur.tag = line.replace(/^tag:\s*/,'').trim(); continue; }
    const txt = line.replace(/^[-*]\s*/,'').trim();
    if (txt && !line.startsWith('#')) cur.change = (cur.change ? cur.change + ' ' : '') + txt;
  }
  if (cur) items.push(cur);
  const tagClass = { '降低':'down','涨价':'down','提升':'up','新增':'new','异常':'dead','恢复':'up','取消':'down','注意':'note' };
  const html = items.slice().reverse().map(item => {
    const tc = tagClass[item.tag] || 'note';
    return `<div class="cl-item">
      <div class="cl-date">${item.date}</div>
      <div class="cl-tool">${item.tool}</div>
      <div class="cl-change" data-tool="${item.tool}">
        ${item.tag ? `<span class="cl-tag ${tc}">${item.tag}</span>` : ''}${item.change}
      </div>
    </div>`;
  }).join('');
  document.getElementById('cl-list').innerHTML =
    html || '<div style="color:var(--muted);padding:20px 0">暂无记录</div>';
}

/* ══════════════════════════════════════
   AI 日报加载
══════════════════════════════════════ */
async function loadNews() {
  const grid = document.getElementById('news-grid');
  const REPO = 'sanhuang520-ship-it/awesome-chinese-ai-tools';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/news`);
    const files = await res.json();
    const dated = files
      .filter(f => /^\d{4}-\d{2}-\d{2}\.md$/.test(f.name))
      .sort((a,b) => b.name.localeCompare(a.name))
      .slice(0, 3);
    if (!dated.length) { renderNewsFallback(); return; }
    const texts = await Promise.all(dated.map(f => fetch(f.download_url).then(r => r.text())));
    grid.innerHTML = texts.map((text, i) => {
      const date = dated[i].name.replace('.md','');
      const lines = text.split('\n');
      const hotIdx = lines.findIndex(l => l.includes('今日重点'));
      const bullets = hotIdx >= 0
        ? lines.slice(hotIdx+1).filter(l => l.trim().startsWith('-')).slice(0,2) : [];
      const body = bullets.map(l => l.replace(/^-\s*/,'• ')).join('<br>') || '今日暂无更新';
      const headline = bullets[0]
        ? bullets[0].replace(/^-\s*\*\*/, '').replace(/\*\*.*/, '').replace(/^-\s*/,'').trim()
        : date + ' 日报';
      return `<div class="news-card" onclick="window.open('https://github.com/${REPO}/blob/main/news/${dated[i].name}','_blank')">
        <div class="news-date">📅 ${date}</div>
        <div class="news-headline">${headline}</div>
        <div class="news-body-text">${body}</div>
      </div>`;
    }).join('');
  } catch(e) { renderNewsFallback(); }
}
function renderNewsFallback() {
  document.getElementById('news-grid').innerHTML = `
    <div class="news-card">
      <div class="news-date">📅 持续更新中</div>
      <div class="news-headline">AI 日报每日更新</div>
      <div class="news-body-text">记录模型更新、免费额度变化、新工具上线，每天一篇</div>
    </div>`;
}
