/* ══════════════════════════════════════
   CSS 变量 & 主题
══════════════════════════════════════ */
:root{
  /* 暖深「黑胶杂志」风（默认深色） */
  --bg:#1b1713;--surface:#252019;--surface2:#2d2720;--surface3:#372f25;
  --border:#3a3329;--border2:#4c4234;
  --accent:#e0795a;        /* 赤陶橙红 — 编辑强调色 */
  --accent2:#86b894;       /* 柔墨绿 */
  --accent3:#d6a84e;       /* 暖金 */
  --text:#efe8da;--text2:#c2b8a4;--muted:#8a7f6b;
  --free:#86b894;--paid:#e0795a;
  --r:10px;--r2:16px;
  --navbar-h:62px;
  --shadow-sm:0 1px 8px rgba(0,0,0,.32);
  --shadow-md:0 6px 26px rgba(0,0,0,.44);
  --shadow-lg:0 18px 56px rgba(0,0,0,.6);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.2,0,0,1);
  --glow:rgba(224,121,90,.18);
  --font-serif:"Songti SC","Noto Serif SC",STSong,STZhongsong,"SimSun",Georgia,"Times New Roman",serif;
  --font-sans:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
[data-theme="light"]{
  /* 暖纸张杂志风（浅色） */
  --bg:#f4efe4;--surface:#fffdf7;--surface2:#efe9db;--surface3:#e7dfcd;
  --border:#e2dac8;--border2:#cfc5ad;
  --accent:#b8442c;        /* 印刷赤陶红 */
  --accent2:#3c6b4d;       /* 墨绿 */
  --accent3:#a8791f;       /* 暖金 */
  --text:#2b2419;--text2:#5e5446;--muted:#9a8f7a;
  --free:#3c6b4d;--paid:#b8442c;
  --glow:rgba(184,68,44,.14);
  --shadow-sm:0 1px 8px rgba(90,70,40,.08);
  --shadow-md:0 6px 24px rgba(90,70,40,.12);
  --shadow-lg:0 18px 50px rgba(90,70,40,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;
}
/* 杂志衬线标题 — 编辑风的灵魂 */
.nav-logo,.hero-card-name,.hero-label-text,.picker-q,.picker-result-tt,
.picker-banner-tt,.modal-title,.wf-drawer-title,.pricing-title,.news-toggle-title{
  font-family:var(--font-serif);
}
/* Apple 细滚动条 */
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--navbar-h);
  background:rgba(27,23,19,.86);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 20px;
}
[data-theme="light"] .navbar{background:rgba(244,239,228,.86)}
.nav-logo{
  font-size:18px;font-weight:700;color:var(--text);
  white-space:nowrap;flex-shrink:0;letter-spacing:.2px
}
.nav-logo span{color:var(--accent)}
.nav-search-wrap{flex:1;max-width:360px;position:relative}
.nav-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
#search{
  width:100%;padding:8px 14px 8px 34px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;color:var(--text);font-size:13px;outline:none;
  transition:border-color .2s,box-shadow .2s
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
#search::placeholder{color:var(--muted)}
.nav-chips{display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-chip{
  font-size:11px;color:var(--muted);padding:3px 10px;
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  white-space:nowrap;
}
.nav-chip b{color:var(--accent);font-weight:700}
.nav-actions{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0}
.nav-quick-btn{
  font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap
}
.nav-quick-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
.nav-quick-btn.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2)}
.theme-toggle{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s
}
.theme-toggle:hover{border-color:var(--accent);transform:rotate(20deg)}

/* ══════════════════════════════════════
   HERO SECTION
══════════════════════════════════════ */
.hero{
  padding:calc(var(--navbar-h) + 28px) 20px 0;
  max-width:1200px;margin:0 auto;
}
.hero-label{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.hero-label-text{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.hero-label-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-label-sub{font-size:11px;color:var(--muted)}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:0;
}
@media(max-width:760px){.hero-grid{grid-template-columns:1fr}}
@media(min-width:761px) and (max-width:980px){.hero-grid{grid-template-columns:1fr 1fr}}

/* 主卡片（第一张，稍大） */
.hero-card{
  position:relative;overflow:hidden;
  border:1px solid var(--border);border-radius:var(--r2);
  padding:22px;
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;
  transition:transform .4s var(--spring),border-color .2s,box-shadow .4s var(--spring);
  text-decoration:none;
  box-shadow:var(--shadow-sm);
}
.hero-card:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:var(--shadow-lg);
  border-color:var(--border2);
}
.hero-card::before{
  content:'';position:absolute;inset:0;opacity:.09;
  background:var(--hero-grad,linear-gradient(135deg,#e0795a,#d6a84e));
  pointer-events:none;transition:opacity .3s;
}
.hero-card:hover::before{opacity:.16}

/* 按分类给 hero 卡片着色 — 暖色编辑调，克制和谐 */
.hero-card[data-cat="llm"]      {--hero-grad:linear-gradient(135deg,#e0795a,#d6a84e);border-color:rgba(224,121,90,.3)}
.hero-card[data-cat="image"]    {--hero-grad:linear-gradient(135deg,#d8694a,#c9803f);border-color:rgba(216,105,74,.3)}
.hero-card[data-cat="video"]    {--hero-grad:linear-gradient(135deg,#c9803f,#d6a84e);border-color:rgba(201,128,63,.3)}
.hero-card[data-cat="code"]     {--hero-grad:linear-gradient(135deg,#86b894,#5a9b7a);border-color:rgba(134,184,148,.3)}
.hero-card[data-cat="writing"]  {--hero-grad:linear-gradient(135deg,#c98a5e,#d6a84e);border-color:rgba(201,138,94,.3)}
.hero-card[data-cat="translate"]{--hero-grad:linear-gradient(135deg,#9bab6a,#86b894);border-color:rgba(155,171,106,.3)}
.hero-card[data-cat="voice"]    {--hero-grad:linear-gradient(135deg,#c77b6a,#d6a84e);border-color:rgba(199,123,106,.3)}
.hero-card[data-cat="search"]   {--hero-grad:linear-gradient(135deg,#7aa896,#86b894);border-color:rgba(122,168,150,.3)}
.hero-card[data-cat="productivity"]{--hero-grad:linear-gradient(135deg,#d6a84e,#c9803f);border-color:rgba(214,168,78,.3)}
.hero-card[data-cat="agent"]    {--hero-grad:linear-gradient(135deg,#86b894,#9bab6a);border-color:rgba(134,184,148,.3)}

.hero-logo{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.hero-logo img{width:32px;height:32px;object-fit:contain;display:block}
.hero-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.hero-card-name{
  font-size:22px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;line-height:1.2;
  letter-spacing:-.3px;
}
.hero-card-name .hero-ext{font-size:13px;color:var(--muted);font-weight:400}
.hero-card-rank{
  font-size:11px;font-weight:700;color:var(--accent);
  background:var(--glow);border:1px solid var(--accent);
  padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap
}
.hero-card-badges{display:flex;gap:5px;flex-wrap:wrap}
.hero-card-desc{font-size:13px;color:var(--text2);line-height:1.7;flex:1}
.hero-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--border);margin-top:auto
}
.hero-free-info{font-size:11px;color:var(--free);font-weight:500}
.hero-cta{
  font-size:12px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;
}
.hero-cta:hover{opacity:.8}
.hero-card-actions{display:flex;gap:5px}

/* ══════════════════════════════════════
   CATEGORY TABS (sticky below navbar)
══════════════════════════════════════ */
.cat-tabs-wrap{
  position:sticky;top:var(--navbar-h);z-index:100;
  background:rgba(27,23,19,.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
}
[data-theme="light"] .cat-tabs-wrap{background:rgba(244,239,228,.9)}
.cat-tabs{
  max-width:1200px;margin:0 auto;
  display:flex;gap:4px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:8px 0;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  padding:6px 14px;
  font-size:13px;color:var(--muted);
  background:none;border:none;border-radius:20px;
  cursor:pointer;white-space:nowrap;
  transition:color .15s,background .15s;
  flex-shrink:0
}
.cat-tab:hover{color:var(--text);background:var(--surface2)}
.cat-tab.active{
  color:var(--text);font-weight:600;
  background:var(--surface3);
  box-shadow:var(--shadow-sm);
}

/* ══════════════════════════════════════
   TOOL LIST (紧凑行)
══════════════════════════════════════ */
.browse{max-width:1200px;margin:0 auto;padding:0 20px 32px}
.list-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 10px;
}
.list-info{font-size:12px;color:var(--muted)}
.list-view-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:20px;padding:3px}
.view-btn{
  background:none;border:none;color:var(--muted);
  padding:4px 10px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s
}
.view-btn.active{background:var(--surface3);color:var(--text);box-shadow:var(--shadow-sm)}
.view-btn:hover:not(.active){color:var(--text)}

.tool-list{display:flex;flex-direction:column;gap:3px}
.tool-row{
  display:grid;
  grid-template-columns:32px 1fr auto auto;
  align-items:center;gap:12px;
  padding:13px 16px;
  background:var(--surface);border:1px solid transparent;border-radius:var(--r);
  transition:background .2s var(--ease-out),border-color .2s,transform .3s var(--spring),box-shadow .3s var(--spring);
  cursor:pointer
}
.tool-row:hover{
  background:var(--surface2);border-color:var(--border);
  transform:translateX(3px);
  box-shadow:var(--shadow-sm);
}
.row-logo{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.row-logo img{width:24px;height:24px;object-fit:contain;display:block}
.logo-fb{
  font-size:13px;font-weight:700;color:var(--text2);
  display:none;align-items:center;justify-content:center;
  width:100%;height:100%;line-height:1
}
.row-main{display:flex;flex-direction:column;gap:3px;min-width:0}
.row-name-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-name{
  font-size:14px;font-weight:600;color:var(--text);text-decoration:none;
  transition:color .12s;white-space:nowrap
}
.row-name:hover{color:var(--accent)}
.row-ext{font-size:10px;color:var(--muted)}
.row-desc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-badges{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.row-actions{display:flex;gap:5px;flex-shrink:0}

/* badge 通用 */
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap;letter-spacing:.1px}
.b-cat{background:var(--cat-bg,var(--glow));color:var(--cat-c,var(--accent))}
.b-free{background:rgba(134,184,148,.12);border:1px solid rgba(134,184,148,.28);color:var(--free)}
.b-paid{background:rgba(224,121,90,.12);border:1px solid rgba(224,121,90,.28);color:var(--paid)}
.b-cn{background:rgba(214,168,78,.12);border:1px solid rgba(214,168,78,.28);color:var(--accent3)}
.b-vpn{background:rgba(138,127,107,.1);border:1px solid rgba(138,127,107,.22);color:var(--muted)}
.b-dead{background:rgba(214,168,78,.1);border:1px solid rgba(214,168,78,.32);color:var(--accent3);cursor:help}
.b-rec{background:var(--glow);border:1px solid var(--accent);color:var(--accent)}

.stars-sm{font-size:10px;color:var(--muted);white-space:nowrap}
.stars-sm .on{color:var(--accent3)}

/* icon 操作按钮 */
.icon-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  min-width:28px;height:28px;padding:0 6px;border-radius:10px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--spring);flex-shrink:0
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.1)}
.icon-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 空状态 */
.list-empty{
  text-align:center;padding:60px 20px;color:var(--muted);
  grid-column:1/-1
}
.list-empty-icon{font-size:40px;margin-bottom:12px}

/* ══════════════════════════════════════
   NEWS SECTION
══════════════════════════════════════ */
.news-section{
  max-width:1200px;margin:0 auto;padding:0 20px 48px;
}
.news-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:14px 0;border-top:1px solid var(--border);margin-bottom:0;
  user-select:none
}
.news-toggle-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.news-dot{width:7px;height:7px;border-radius:50%;background:var(--free);animation:pulse 2s infinite}
.news-toggle-arrow{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s}
.news-toggle.open .news-toggle-arrow{transform:rotate(180deg)}
.news-more{font-size:12px;color:var(--accent);text-decoration:none;margin-left:12px}
.news-more:hover{text-decoration:underline}
.news-body{display:none;padding-top:14px}
.news-body.show{display:block}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.news-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;flex-direction:column;gap:5px;
  transition:border-color .15s;cursor:pointer
}
.news-card:hover{border-color:var(--accent)}
.news-date{font-size:11px;color:var(--muted)}
.news-headline{font-size:13px;font-weight:600;color:var(--text);line-height:1.5}
.news-body-text{font-size:12px;color:var(--muted);line-height:1.6}

/* ══════════════════════════════════════
   WORKFLOW DRAWER
══════════════════════════════════════ */
.wf-fab{
  position:fixed;right:20px;bottom:24px;z-index:150;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;padding:10px 18px;border-radius:50px;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 24px rgba(224,121,90,.42);
  display:flex;align-items:center;gap:7px;
  transition:transform .15s,box-shadow .15s
}
.wf-fab:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(224,121,90,.55)}
.wf-fab-icon{font-size:16px}

.wf-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s
}
.wf-overlay.show{opacity:1;pointer-events:auto}

.wf-drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:310;
  width:min(480px,100vw);
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;overflow:hidden
}
.wf-drawer.show{transform:translateX(0)}

.wf-drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0
}
.wf-drawer-title{font-size:16px;font-weight:700;color:var(--text)}
.wf-drawer-close{
  background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px
}
.wf-drawer-close:hover{background:var(--surface2);color:var(--text)}
.wf-drawer-body{flex:1;overflow-y:auto;padding:20px}

.wf-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.wf-input-wrap{position:relative;margin-bottom:12px}
.wf-input{
  width:100%;padding:12px 100px 12px 16px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:10px;color:var(--text);
  font-size:14px;outline:none;transition:border-color .2s
}
.wf-input:focus{border-color:var(--accent)}
.wf-input::placeholder{color:var(--muted)}
.wf-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;color:#fff;padding:7px 14px;
  border-radius:7px;font-size:13px;cursor:pointer;font-weight:600
}
.wf-examples{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.wf-tag{
  padding:4px 11px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s
}
.wf-tag:hover{border-color:var(--accent);color:var(--accent)}

.wf-result{margin-top:20px;display:none}
.wf-result.show{display:block}
.wf-result-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.wf-result-desc{font-size:12px;color:var(--muted);margin-bottom:14px}
.wf-steps{display:flex;flex-direction:column;gap:10px}
.wf-step{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px
}
.wf-step-num{
  min-width:26px;height:26px;border-radius:50%;
  background:var(--glow);border:1px solid var(--accent);
  color:var(--accent);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.wf-step-body{flex:1}
.wf-step-action{font-size:12px;color:var(--muted);margin-bottom:3px}
.wf-step-tool{font-size:14px;font-weight:600}
.wf-step-tool a{color:var(--accent2);text-decoration:none}
.wf-step-tool a:hover{text-decoration:underline}
.wf-step-tip{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6;
  background:rgba(255,255,255,.03);border-radius:5px;padding:5px 9px;border-left:2px solid var(--border)}
.wf-nomatch{text-align:center;padding:20px;color:var(--muted);font-size:13px;
  background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.wf-actions{display:flex;gap:8px;margin-top:12px}
.wf-clear{background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.wf-clear:hover{border-color:var(--muted);color:var(--text)}

/* ══════════════════════════════════════
   COMPARE BAR
══════════════════════════════════════ */
.compare-bar{
  position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(160%);
  background:var(--surface);border:1px solid var(--accent);border-radius:14px;
  padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:200;max-width:92vw;
  box-shadow:0 14px 44px rgba(0,0,0,.5);transition:transform .28s cubic-bezier(.2,.8,.2,1)
}
.compare-bar.show{transform:translateX(-50%) translateY(0)}
.compare-bar-text{font-size:13px;color:var(--text)}
.compare-bar-text b{color:var(--accent2)}
.compare-bar-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer
}
.compare-bar-btn:disabled{opacity:.45;cursor:not-allowed}
.compare-bar-clear{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer}
.compare-bar-clear:hover{color:var(--text);border-color:var(--muted)}

/* ══════════════════════════════════════
   COMPARE MODAL
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:400;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  max-width:920px;width:100%;padding:24px;box-shadow:var(--shadow-lg);
  animation:modal-in .35s var(--spring);
}
@keyframes modal-in{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.modal-close{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.modal-close:hover{color:var(--text);border-color:var(--muted);transform:rotate(90deg)}
.cmp-scroll{overflow-x:auto}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px}
.cmp-table th,.cmp-table td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.cmp-table thead th{color:var(--accent2);font-weight:700;font-size:14px}
.cmp-table tbody th{color:var(--muted);font-weight:500;font-size:12px;white-space:nowrap;width:88px}
.cmp-table td{color:var(--text);line-height:1.6}
.cmp-actions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
  transition:opacity .2s,transform .3s var(--spring)
}
.btn-primary:hover{opacity:.88;transform:scale(1.03)}
.btn-ghost{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:9px 16px;border-radius:20px;font-size:13px;cursor:pointer;
  transition:all .2s
}
.btn-ghost:hover{color:var(--text);border-color:var(--muted);background:var(--surface2)}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{
  position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(16px);
  background:var(--surface);color:var(--text);padding:10px 20px;border-radius:20px;
  border:1px solid var(--border2);box-shadow:var(--shadow-md);
  font-size:13px;font-weight:600;opacity:0;pointer-events:none;z-index:500;
  transition:opacity .25s,transform .35s var(--spring)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer{
  text-align:center;padding:24px 20px;border-top:1px solid var(--border);
  color:var(--muted);font-size:12px;max-width:1200px;margin:0 auto
}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}

/* ══════════════════════════════════════
   PRICE TAB 特殊样式
══════════════════════════════════════ */
.cat-tab-price{
  margin-left:auto;flex-shrink:0;
  color:var(--accent3) !important;
}
.cat-tab-price:hover,.cat-tab-price.active{
  background:rgba(214,168,78,.14) !important;
  color:var(--accent3) !important;
  box-shadow:0 0 0 1px rgba(214,168,78,.32) !important;
}

/* ══════════════════════════════════════
   PRICING VIEW
══════════════════════════════════════ */
.pricing-view{
  max-width:1100px;margin:0 auto;padding:20px 20px 40px;
  display:none;
}
.pricing-view.active{display:block}

.pricing-summary{
  display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;
}
.pricing-stat{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  font-size:13px;
}
.pricing-stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pricing-stat-dot.free{background:var(--free)}
.pricing-stat-dot.freemium{background:var(--accent3)}
.pricing-stat-dot.paid{background:var(--paid)}
.pricing-stat-num{font-weight:700;font-size:16px;color:var(--text)}
.pricing-stat-label{color:var(--muted)}

.pricing-section{margin-bottom:28px}
.pricing-section-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--muted);
  padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:0;
  text-transform:uppercase;letter-spacing:.04em;
}
.pricing-section-badge{
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;
}
.ps-free  .pricing-section-badge{background:rgba(134,184,148,.16);color:var(--free)}
.ps-freemium .pricing-section-badge{background:rgba(214,168,78,.16);color:var(--accent3)}
.ps-paid  .pricing-section-badge{background:rgba(224,121,90,.16);color:var(--paid)}

.pricing-table{width:100%;border-collapse:collapse}
.pricing-table th{
  text-align:left;font-size:11px;font-weight:600;color:var(--muted);
  padding:8px 12px;border-bottom:1px solid var(--border);
  background:var(--surface);
  text-transform:uppercase;letter-spacing:.04em;
}
.pricing-table tr:not(:last-child) td{border-bottom:1px solid var(--border)}
.pricing-table td{
  padding:11px 12px;font-size:13px;vertical-align:middle;
}
.pricing-table tr:hover td{background:var(--surface2)}
.pt-name a{
  color:var(--text);text-decoration:none;font-weight:600;
}
.pt-name a:hover{color:var(--accent)}
.pt-name a::after{content:" ↗";font-size:10px;color:var(--muted);font-weight:400}
.pt-free-desc{color:var(--text2);font-size:12px}
.pt-pro-price{
  font-weight:700;font-size:13px;white-space:nowrap;
}
.pt-pro-price.has-price{color:var(--paid)}
.pt-pro-price.no-price{color:var(--muted)}
.pt-pro-note{font-size:11px;color:var(--muted);margin-top:2px}
.pt-badges{display:flex;gap:4px;flex-wrap:wrap}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:640px){
  .nav-chips{display:none}
  .nav-search-wrap{max-width:none}
  .nav-quick-btn{display:none}
  .tool-row{grid-template-columns:24px 1fr auto;gap:8px;padding:10px 10px}
  .row-badges{display:none}
  .hero{padding-top:calc(var(--navbar-h) + 16px)}
  .wf-fab{right:14px;bottom:18px;padding:9px 14px;font-size:12px}
  .pricing-table th:nth-child(3),.pricing-table td:nth-child(3){display:none}
  .pt-pro-note{display:none}
  .picker-banner{flex-direction:column;align-items:flex-start;gap:8px}
  .picker-opts{grid-template-columns:1fr 1fr}
}

/* ══════════════════════════════════════
   决策器 — 3秒选工具
══════════════════════════════════════ */
.picker-banner{
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin-bottom:18px;padding:16px 20px;border-radius:var(--r2);
  background:linear-gradient(120deg,rgba(224,121,90,.14),rgba(214,168,78,.1));
  border:1px solid var(--border2);cursor:pointer;
  transition:transform .35s var(--spring),box-shadow .35s var(--spring),border-color .25s;
}
.picker-banner::before{
  content:'';position:absolute;top:0;left:-60%;width:45%;height:100%;pointer-events:none;
  background:linear-gradient(100deg,transparent,rgba(255,247,237,.12),transparent);
  transform:skewX(-20deg);animation:pk-shimmer 5s ease-in-out infinite;
}
@keyframes pk-shimmer{0%,55%{left:-60%}100%{left:135%}}
.picker-banner:hover{transform:translateY(-3px);box-shadow:0 12px 38px rgba(224,121,90,.26);border-color:var(--accent)}
.picker-banner-l{display:flex;align-items:center;gap:14px;min-width:0;position:relative;z-index:1}
.picker-banner-icon{
  font-size:22px;flex-shrink:0;width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(224,121,90,.26),rgba(214,168,78,.2));
  border:1px solid rgba(224,121,90,.3);box-shadow:0 0 20px rgba(224,121,90,.22);
}
.picker-banner-tt{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.2px}
.picker-banner-sub{font-size:12px;color:var(--text2);margin-top:3px}
.picker-banner-cta{
  position:relative;z-index:1;
  font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;
  padding:9px 20px;border-radius:20px;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  box-shadow:0 4px 16px rgba(224,121,90,.36);
  transition:transform .3s var(--spring);
}
.picker-banner:hover .picker-banner-cta{transform:translateX(4px)}

.picker-modal{
  position:fixed;inset:0;z-index:450;display:none;
  align-items:center;justify-content:center;padding:20px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.picker-modal.show{display:flex}
.picker-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);
  width:100%;max-width:560px;padding:26px;box-shadow:var(--shadow-lg);
  animation:modal-in .35s var(--spring);max-height:90vh;overflow-y:auto;
}
.picker-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.picker-progress{display:flex;gap:6px}
.picker-dot{width:22px;height:4px;border-radius:4px;background:var(--border2);transition:background .3s}
.picker-dot.on{background:var(--accent)}
.picker-close{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.picker-close:hover{color:var(--text);transform:rotate(90deg)}
.picker-q{font-size:20px;font-weight:700;color:var(--text);margin:18px 0 4px;letter-spacing:-.3px}
.picker-q-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.picker-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.picker-opt{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:16px 10px;border-radius:var(--r);cursor:pointer;
  background:var(--surface2);border:1.5px solid var(--border);
  transition:all .25s var(--spring);text-align:center;
}
.picker-opt:hover{border-color:var(--accent);transform:translateY(-3px);background:var(--surface3)}
.picker-opt-emoji{font-size:26px;line-height:1}
.picker-opt-label{font-size:13px;font-weight:600;color:var(--text)}
.picker-back{
  margin-top:18px;background:none;border:none;color:var(--muted);
  font-size:13px;cursor:pointer;padding:4px;transition:color .2s;
}
.picker-back:hover{color:var(--text)}

.picker-result-head{display:flex;align-items:center;gap:10px;margin:8px 0 4px}
.picker-result-emoji{font-size:30px}
.picker-result-tt{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.picker-result-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.picker-rec{
  display:flex;align-items:center;gap:13px;padding:14px 16px;margin-bottom:10px;
  border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);
  text-decoration:none;transition:all .25s var(--spring);
}
.picker-rec:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:var(--shadow-sm)}
.picker-rec-rank{
  width:30px;height:30px;flex-shrink:0;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
}
.picker-rec.r2 .picker-rec-rank{background:var(--surface3);color:var(--text2)}
.picker-rec.r3 .picker-rec-rank{background:var(--surface3);color:var(--text2)}
.picker-rec-main{flex:1;min-width:0}
.picker-rec-name{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.picker-rec-desc{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-rec-go{font-size:18px;color:var(--accent);flex-shrink:0}
.picker-empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:14px}
.picker-result-actions{display:flex;gap:10px;margin-top:16px}

/* ══════════════════════════════════════
   本周动态时间线
══════════════════════════════════════ */
.timeline-section{max-width:1200px;margin:0 auto;padding:8px 20px 24px}
.timeline-head{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.timeline-title{
  font-family:var(--font-serif);font-size:21px;font-weight:700;
  color:var(--text);letter-spacing:.3px;
}
.timeline-sub{font-size:12px;color:var(--muted)}
.timeline{position:relative;padding-left:26px}
.timeline::before{
  content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(180deg,var(--border2),transparent);
}
.tl-item{
  position:relative;padding:0 0 20px;
  animation:tl-in .5s var(--ease-out) backwards;
}
.tl-item:last-child{padding-bottom:0}
.tl-item:nth-child(1){animation-delay:.04s}
.tl-item:nth-child(2){animation-delay:.09s}
.tl-item:nth-child(3){animation-delay:.14s}
.tl-item:nth-child(4){animation-delay:.19s}
.tl-item:nth-child(5){animation-delay:.24s}
.tl-item:nth-child(6){animation-delay:.29s}
.tl-item:nth-child(7){animation-delay:.34s}
@keyframes tl-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.tl-dot{
  position:absolute;left:-26px;top:3px;width:16px;height:16px;border-radius:50%;
  background:var(--surface);border:3px solid var(--accent);
  box-shadow:0 0 0 3px var(--bg);
}
.tl-dot.t-site{border-color:var(--accent)}
.tl-dot.t-tool{border-color:var(--free)}
.tl-dot.t-price{border-color:var(--accent3)}
.tl-dot.t-model{border-color:var(--accent)}
.tl-dot.t-alert{border-color:var(--paid)}
.tl-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tl-date{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.tl-tag{
  font-size:10px;font-weight:600;padding:1.5px 8px;border-radius:20px;letter-spacing:.2px;
}
.tl-tag.t-site{background:var(--glow);color:var(--accent)}
.tl-tag.t-tool{background:rgba(134,184,148,.14);color:var(--free)}
.tl-tag.t-price{background:rgba(214,168,78,.14);color:var(--accent3)}
.tl-tag.t-model{background:var(--glow);color:var(--accent)}
.tl-tag.t-alert{background:rgba(224,121,90,.14);color:var(--paid)}
.tl-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
.tl-desc{font-size:12.5px;color:var(--text2);line-height:1.6;margin-top:2px}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     NAVBAR
══════════════════════════════════════ -->
<nav class="navbar">
  <div class="nav-logo"><span>AI</span> 工具导航</div>
  <div class="nav-search-wrap">
    <span class="nav-search-icon">🔍</span>

    <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
  </div>
</nav>

<!-- ══════════════════════════════════════
     HERO — 今日精选
══════════════════════════════════════ -->
<section class="hero" id="hero-section" data-view="list">
  <div class="picker-banner" id="picker-banner">

      <span class="picker-banner-icon">🎯</span>

  </div>

<!-- ══════════════════════════════════════
     CATEGORY TABS
══════════════════════════════════════ -->
<div class="cat-tabs-wrap">
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="all">全部</button>
    <button class="cat-tab" data-cat="llm">💬 LLM</button>
    <button class="cat-tab" data-cat="image">🎨 图像</button>
    <button class="cat-tab" data-cat="video">🎬 视频</button>
    <button class="cat-tab" data-cat="code">💻 编程</button>
    <button class="cat-tab" data-cat="writing">✍️ 写作</button>
    <button class="cat-tab" data-cat="translate">🌐 翻译</button>

function renderHero() {
  const heroGrid = document.getElementById('hero-grid');
  // 取当前筛选条件下 rec:true 的工具，最多 3 个
  const recTools = tools.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (onlyFree && !t.free) return false;
    if (onlyCN && !t.cn) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!t.name.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return false;
    }
    return t.rec;
  }).slice(0, 3);

  if (!recTools.length) { heroGrid.innerHTML = ''; return; }

  const cm = t => catMeta[t.cat] || {label:'',color:'#a89880',bg:'rgba(168,152,128,.14)'};

function faviconUrl(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
  catch { return ''; }
}
function logoHTML(t, cls='row-logo') {
  const src = faviconUrl(t.url);
  const letter = t.name[0].toUpperCase();
  return `<div class="${cls}">
    <img src="${src}" alt="" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <span class="logo-fb">${letter}</span>
  </div>`;
}

function starsHTML(n) {
  return '<span class="stars-sm">' +
    Array.from({length:5}, (_,i) => `<span class="${i<n?'on':''}">★</span>`).join('') +
    '</span>';
}

function renderList() {
  const filtered = tools.filter(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return false;
    if (onlyFree && !t.free) return false;
    if (onlyCN && !t.cn) return false;
    if (onlyRec && !t.rec) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!t.name.toLowerCase().includes(q) &&
          !t.desc.toLowerCase().includes(q) &&
          !t.freeInfo.toLowerCase().includes(q) &&
          !(catMeta[t.cat]?.label || '').includes(q)) return false;
    }
    return true;
  });

  document.getElementById('list-info').textContent =
    `显示 ${filtered.length} / ${tools.length} 个工具`;

  const list = document.getElementById('tool-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty">
      <div class="list-empty-icon">🔍</div>
      <div>没有找到匹配的工具，换个关键词试试</div></div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b) => (b.rec?1:0)-(a.rec?1:0));
  const cm = t => catMeta[t.cat] || {label:'',color:'#a89880',bg:'rgba(168,152,128,.14)'};
  const isDead = t => t.linkOk === false && (t.linkFailCount||0) >= 2;

  list.innerHTML = sorted.map((t, i) => `
    <div class="tool-row" data-id="${t._id}">
      ${logoHTML(t)}
      <div class="row-main">
        <div class="row-name-line">
          <a class="row-name" href="${t.url}" target="_blank" rel="noopener"
             onclick="event.stopPropagation()">${t.name}<span class="row-ext"> ↗</span></a>
          ${t.rec ? '<span class="badge b-rec">⭐ 精选</span>' : ''}
          ${isDead(t) ? `<span class="badge b-dead" title="链接异常·${t.linkCheckedAt}·连续${t.linkFailCount}次">⚠️ 链接可能失效</span>` : ''}
        </div>
        <div class="row-desc">${t.freeInfo}</div>
      </div>
      <div class="row-badges">
        <span class="badge b-cat" style="--cat-bg:${cm(t).bg};--cat-c:${cm(t).color}">${cm(t).label}</span>
        ${t.free ? '<span class="badge b-free">免费</span>' : '<span class="badge b-paid">付费</span>'}
        ${t.cn ? '<span class="badge b-cn">🇨🇳</span>' : ''}
        ${t.vpn ? '<span class="badge b-vpn">梯子</span>' : ''}
        ${starsHTML(t.stars)}
      </div>
      <div class="row-actions">
        <button class="icon-btn cmp-btn ${compareSet.has(t._id)?'active':''}" data-id="${t._id}" title="加入对比" onclick="event.stopPropagation()">⇄</button>
        <button class="icon-btn copy-btn" data-id="${t._id}" title="复制信息" onclick="event.stopPropagation()">⧉</button>
      </div>
    </div>`).join('');
}

function render() {
  renderHero();
  renderList();
}

/* ══════════════════════════════════════
   加载工具数据
══════════════════════════════════════ */
async function loadTools() {
  try {
    const res = await fetch('data/tools.json', {cache:'no-cache'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    catMeta = data.categories || {};
    tools = (data.tools || []).map((t,i) => ({...t, _id:i}));
    document.getElementById('tc').textContent = tools.length;
    render();
  } catch(e) {
    document.getElementById('tool-list').innerHTML =
      `<div class="list-empty"><div class="list-empty-icon">⚠️</div>
       <div>工具数据加载失败</div>
       <div style="font-size:12px;margin-top:6px">请在
       <a href="https://sanhuang520-ship-it.github.io/awesome-chinese-ai-tools/" style="color:var(--accent)">线上站点</a>查看</div></div>`;
    console.error('加载 tools.json 失败：', e);
  }
}

document.getElementById('tool-list').addEventListener('click', e => {
  const cmp = e.target.closest('.cmp-btn');
  const cp  = e.target.closest('.copy-btn');
  if (cmp) {
    const id = +cmp.dataset.id;
    if (compareSet.has(id)) { compareSet.delete(id); }
    else {
      if (compareSet.size >= MAX_COMPARE) { toast(`最多同时对比 ${MAX_COMPARE} 个工具`); return; }
      compareSet.add(id);
    }
    cmp.classList.toggle('active', compareSet.has(id));
    updateCompareBar();
  } else if (cp) {
    const t = tools.find(x => x._id === +cp.dataset.id);
    if (t) copyText(toolToMarkdown(t), '已复制工具信息');
  }
});

function toolToMarkdown(t) {
  const cm = catMeta[t.cat] || {};
  const tags = [cm.label, t.free?'免费':'付费', t.cn?'国产':'', t.vpn?'需梯子':''].filter(Boolean).join(' · ');
  return `**${t.name}** — ${tags}\n额度：${t.freeInfo}｜中文支持：${'★'.repeat(t.stars)}\n${t.desc}\n${t.url}`;
}
function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  document.getElementById('cmp-count').textContent = compareSet.size;
  document.getElementById('cmp-open').disabled = compareSet.size < 2;
  bar.classList.toggle('show', compareSet.size > 0);
}
document.getElementById('cmp-clear').addEventListener('click', () => {
  compareSet.clear();
  document.querySelectorAll('.cmp-btn.active').forEach(b => b.classList.remove('active'));
  updateCompareBar();
});
function openCompare() {
  if (compareSet.size < 2) { toast('至少选择 2 个工具'); return; }
  const sel = tools.filter(t => compareSet.has(t._id));
  const cm = t => catMeta[t.cat] || {};
  const rows = [
    ['分类', t => cm(t).label||''],
    ['免费额度', t => t.freeInfo],
    ['是否免费', t => t.free ? '✅ 免费' : '💰 付费'],
    ['国产', t => t.cn ? '🇨🇳 是' : '—'],
    ['需梯子', t => t.vpn ? '是' : '否'],
    ['中文支持', t => '★'.repeat(t.stars)+'☆'.repeat(5-t.stars)],
    ['简介', t => t.desc],
    ['官网', t => `<a href="${t.url}" target="_blank" rel="noopener" style="color:var(--accent2)">打开 ↗</a>`],
  ];
  const head = `<thead><tr><th></th>${sel.map(t=>`<th>${t.name}</th>`).join('')}</tr></thead>`;
  const body = `<tbody>${rows.map(([label,fn])=>
    `<tr><th>${label}</th>${sel.map(t=>`<td>${fn(t)}</td>`).join('')}</tr>`).join('')}</tbody>`;
  document.getElementById('cmp-table').innerHTML = head + body;
  document.getElementById('cmp-modal').classList.add('show');
}
function compareToMarkdown() {
  const sel = tools.filter(t => compareSet.has(t._id));
  const cm = t => catMeta[t.cat] || {};
  const cols = ['对比项', ...sel.map(t=>t.name)];
  const rows = [
    ['分类', ...sel.map(t=>cm(t).label||'')],
    ['免费额度', ...sel.map(t=>t.freeInfo)],
    ['是否免费', ...sel.map(t=>t.free?'免费':'付费')],
    ['国产', ...sel.map(t=>t.cn?'是':'—')],
    ['需梯子', ...sel.map(t=>t.vpn?'是':'否')],
    ['中文支持', ...sel.map(t=>'★'.repeat(t.stars))],
    ['官网', ...sel.map(t=>t.url)],
  ];
  const line = arr => '| '+arr.join(' | ')+' |';
  return [line(cols), line(cols.map(()=>'---')), ...rows.map(line)].join('\n');
}
document.getElementById('cmp-open').addEventListener('click', openCompare);

/* ══════════════════════════════════════
   复制 + Toast
══════════════════════════════════════ */
function copyText(text, msg) {
  const done = () => toast(msg||'已复制');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta); cb?.();
}
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function matchWorkflow(input) {
  if (!input.trim()) return null;
  const q = input.toLowerCase();
  let best = null, bestScore = 0;
  for (const wf of workflows) {
    let score = 0;
    for (const kw of wf.keywords) {
      if (q.includes(kw.toLowerCase()))
        score += kw.length >= 3 ? 3 : kw.length === 2 ? 2 : 1;
    }
    if (score > bestScore) { bestScore = score; best = wf; }
  }
  return bestScore > 0 ? best : null;
}
function showWorkflow(wf) {
  document.getElementById('wf-rtitle').innerHTML = `${wf.emoji} ${wf.title}`;
  document.getElementById('wf-rdesc').textContent = wf.desc;
  document.getElementById('wf-steps').innerHTML = wf.steps.map((s,i) => `
    <div class="wf-step">
      <div class="wf-step-num">${i+1}</div>
      <div class="wf-step-body">
        <div class="wf-step-action">${s.emoji} ${s.action}</div>
        <div class="wf-step-tool">推荐：<a href="${s.url}" target="_blank" rel="noopener">${s.tool} ↗</a></div>
        <div class="wf-step-tip">💡 ${s.tip}</div>
      </div>
    </div>`).join('');
  document.getElementById('wf-result').classList.add('show');
}

  document.getElementById('wf-result').classList.add('show');
}
document.getElementById('wf-btn').addEventListener('click', () => {
  const q = document.getElementById('wf-input').value;
  const wf = matchWorkflow(q);
  wf ? showWorkflow(wf) : showNoMatch();
});
document.getElementById('wf-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('wf-btn').click();
});
document.querySelectorAll('.wf-tag').forEach(t => {
  t.addEventListener('click', () => {
    document.getElementById('wf-input').value = t.dataset.q;
    const wf = matchWorkflow(t.dataset.q);
    wf ? showWorkflow(wf) : showNoMatch();
  });
});
document.getElementById('wf-clear').addEventListener('click', () => {
  document.getElementById('wf-result').classList.remove('show');
  document.getElementById('wf-input').value = '';
});

document.getElementById('news-toggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('news-body').classList.toggle('show');

/* ══════════════════════════════════════
   AI 日报加载
══════════════════════════════════════ */
async function loadNews() {
  const grid = document.getElementById('news-grid');
  const REPO = 'sanhuang520-ship-it/awesome-chinese-ai-tools';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/news`);
    const files = await res.json();
    const dated = files
      .filter(f => /^\d{4}-\d{2}-\d{2}\.md$/.test(f.name))
      .sort((a,b) => b.name.localeCompare(a.name))
      .slice(0, 3);
    if (!dated.length) { renderNewsFallback(); return; }
    const texts = await Promise.all(dated.map(f => fetch(f.download_url).then(r => r.text())));
    grid.innerHTML = texts.map((text, i) => {
      const date = dated[i].name.replace('.md','');
      const lines = text.split('\n');
      const hotIdx = lines.findIndex(l => l.includes('今日重点'));
      const bullets = hotIdx >= 0
        ? lines.slice(hotIdx+1).filter(l => l.trim().startsWith('-')).slice(0,2) : [];
      const body = bullets.map(l => l.replace(/^-\s*/,'• ')).join('<br>') || '今日暂无更新';
      const headline = bullets[0]
        ? bullets[0].replace(/^-\s*\*\*/, '').replace(/\*\*.*/, '').replace(/^-\s*/,'').trim()
        : date + ' 日报';
      return `<div class="news-card" onclick="window.open('https://github.com/${REPO}/blob/main/news/${dated[i].name}','_blank')">
        <div class="news-date">📅 ${date}</div>
        <div class="news-headline">${headline}</div>
        <div class="news-body-text">${body}</div>
      </div>`;
    }).join('');
  } catch(e) { renderNewsFallback(); }
}
function renderNewsFallback() {
  document.getElementById('news-grid').innerHTML = `
    <div class="news-card">
      <div class="news-date">📅 持续更新中</div>
      <div class="news-headline">AI 日报每日更新</div>
      <div class="news-body-text">记录模型更新、免费额度变化、新工具上线，每天一篇</div>
    </div>`;
}

/* ══════════════════════════════════════
   本周动态时间线
══════════════════════════════════════ */
const TL_TAGS = {
  site:  '站点更新',
  tool:  '新增工具',
  price: '价格变动',
  model: '模型动态',
  alert: '失效提醒',
};
async function loadUpdates() {
  const sec = document.getElementById('timeline-section');
  const tl  = document.getElementById('timeline');
  try {
    const res = await fetch('data/updates.json', {cache:'no-cache'});
    const data = await res.json();
    const events = (data.events || []).slice(0, 7);
    if (!events.length) return;
    tl.innerHTML = events.map(ev => {
      const t = ev.type in TL_TAGS ? ev.type : 'site';
      return `<div class="tl-item">
        <span class="tl-dot t-${t}"></span>
        <div class="tl-meta">
          <span class="tl-date">${ev.date}</span>
          <span class="tl-tag t-${t}">${TL_TAGS[t]}</span>
        </div>
        <div class="tl-title">${ev.title}</div>
        ${ev.desc ? `<div class="tl-desc">${ev.desc}</div>` : ''}
      </div>`;
    }).join('');
    document.getElementById('timeline-sub').textContent = '— 持续记录工具与价格变化';
    sec.style.display = 'block';
  } catch(e) { /* 静默：无数据则不显示 */ }
}

/* ══════════════════════════════════════
   主题切换
══════════════════════════════════════ */
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved);
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    applyTheme(next); localStorage.setItem('theme', next);
  });
})();
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'light' ? '☀️' : '🌙';
}

/* ══════════════════════════════════════
   决策器 — 3秒选工具
══════════════════════════════════════ */
const PICKER_CATS = [
  {v:'llm',          e:'💬', l:'聊天问答'},
  {v:'image',        e:'🎨', l:'AI 画图'},
  {v:'video',        e:'🎬', l:'做视频'},
  {v:'code',         e:'💻', l:'写代码'},
  {v:'writing',      e:'✍️', l:'写文案'},
  {v:'translate',    e:'🌐', l:'翻译'},
  {v:'voice',        e:'🎙️', l:'语音配音'},
  {v:'search',       e:'🔎', l:'AI 搜索'},
  {v:'productivity', e:'⚡', l:'提升效率'},
  {v:'agent',        e:'🤖', l:'搭智能体'},
];
let pkState = {step:0, cat:null, free:false, vpn:false};

function pkProgress(n){
  for(let i=0;i<3;i++) document.getElementById('pdot-'+i).classList.toggle('on', i<=n);
}
function openPicker(){
  pkState = {step:0, cat:null, free:false, vpn:false};
  pkRenderStep(0);
  document.getElementById('picker-modal').classList.add('show');
}
function closePicker(){
  document.getElementById('picker-modal').classList.remove('show');
}
function pkRenderStep(step){
  pkState.step = step;
  pkProgress(step);
  const body = document.getElementById('picker-body');
  if(step===0){
    body.innerHTML = `
      <div class="picker-q">你想用 AI 做什么？</div>
      <div class="picker-q-sub">选一个最贴近的方向</div>
      <div class="picker-opts">
        ${PICKER_CATS.map(c=>`
          <div class="picker-opt" data-field="cat" data-val="${c.v}">
            <span class="picker-opt-emoji">${c.e}</span>
            <span class="picker-opt-label">${c.l}</span>
          </div>`).join('')}
      </div>`;
  } else if(step===1){
    body.innerHTML = `
      <div class="picker-q">预算怎么样？</div>
      <div class="picker-q-sub">帮你过滤掉不合适的</div>
      <div class="picker-opts" style="grid-template-columns:1fr 1fr">
        <div class="picker-opt" data-field="free" data-val="1">
          <span class="picker-opt-emoji">🆓</span>
          <span class="picker-opt-label">只看免费的</span>
        </div>
        <div class="picker-opt" data-field="free" data-val="0">
          <span class="picker-opt-emoji">💎</span>
          <span class="picker-opt-label">付费也没关系</span>
        </div>
      </div>
      <button class="picker-back" data-back="0">← 上一步</button>`;
  } else if(step===2){
    body.innerHTML = `
      <div class="picker-q">网络环境？</div>
      <div class="picker-q-sub">国内直连 = 不用梯子就能访问</div>
      <div class="picker-opts" style="grid-template-columns:1fr 1fr">
        <div class="picker-opt" data-field="vpn" data-val="1">
          <span class="picker-opt-emoji">🇨🇳</span>
          <span class="picker-opt-label">要国内直连</span>
        </div>
        <div class="picker-opt" data-field="vpn" data-val="0">
          <span class="picker-opt-emoji">🌍</span>
          <span class="picker-opt-label">有梯子，都行</span>
        </div>
      </div>
      <button class="picker-back" data-back="1">← 上一步</button>`;
  }
}
function pkRenderResult(){
  pkProgress(2);
  let res = tools.filter(t=>
    (pkState.cat==='all' || t.cat===pkState.cat) &&
    (!pkState.free || t.free) &&
    (!pkState.vpn  || !t.vpn)
  );
  res.sort((a,b)=> ((b.rec?1:0)-(a.rec?1:0)) || ((b.stars||0)-(a.stars||0)));
  const top = res.slice(0,3);
  const catMt = PICKER_CATS.find(c=>c.v===pkState.cat) || {e:'✨', l:'AI 工具'};
  const body = document.getElementById('picker-body');
  if(!top.length){
    body.innerHTML = `
      <div class="picker-result-head">
        <span class="picker-result-emoji">😅</span>
        <span class="picker-result-tt">没找到完全匹配的</span>
      </div>
      <div class="picker-empty">试试放宽条件，比如允许付费、或接受需要梯子的工具</div>
      <div class="picker-result-actions">
        <button class="btn-primary" id="pk-restart">↺ 重新选择</button>
      </div>`;
    return;
  }
  body.innerHTML = `
    <div class="picker-result-head">
      <span class="picker-result-emoji">${catMt.e}</span>
      <span class="picker-result-tt">为你推荐这 ${top.length} 个</span>
    </div>
    <div class="picker-result-sub">按精选程度和热度排序，点击直达官网</div>
    ${top.map((t,i)=>`
      <a class="picker-rec r${i+1}" href="${t.url}" target="_blank" rel="noopener">
        <span class="picker-rec-rank">${i+1}</span>
        <span class="picker-rec-main">
          <span class="picker-rec-name">${t.name}
            ${t.rec?'<span class="badge b-rec">⭐ 精选</span>':''}
            ${t.free?'<span class="badge b-free">免费</span>':'<span class="badge b-paid">付费</span>'}
          </span>
          <span class="picker-rec-desc">${t.freeInfo || t.desc || ''}</span>
        </span>
        <span class="picker-rec-go">→</span>
      </a>`).join('')}
    <div class="picker-result-actions">
      <button class="btn-ghost" id="pk-restart">↺ 重新选</button>
      <button class="btn-primary" id="pk-browse">浏览全部 ${res.length} 个 →</button>
    </div>`;
}

document.getElementById('picker-banner').addEventListener('click', openPicker);
document.getElementById('picker-close').addEventListener('click', closePicker);
document.getElementById('picker-modal').addEventListener('click', e=>{
  if(e.target.id==='picker-modal') closePicker();
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closePicker();
});
document.getElementById('picker-body').addEventListener('click', e=>{
  const opt     = e.target.closest('.picker-opt');
  const back    = e.target.closest('.picker-back');
  const restart = e.target.closest('#pk-restart');
  const browse  = e.target.closest('#pk-browse');
  if(opt){
    const f = opt.dataset.field, v = opt.dataset.val;
    if(f==='cat')  pkState.cat  = v;
    if(f==='free') pkState.free = v==='1';
    if(f==='vpn')  pkState.vpn  = v==='1';
    if(pkState.step<2) pkRenderStep(pkState.step+1);
    else pkRenderResult();
  } else if(back){
    pkRenderStep(parseInt(back.dataset.back,10));
  } else if(restart){
    openPicker();
  } else if(browse){
    closePicker();
    const catTab = document.querySelector(`.cat-tab[data-cat="${pkState.cat}"]`);
    if(catTab) catTab.click();
    document.getElementById('browse-section').scrollIntoView({behavior:'smooth'});
  }
});

   启动
══════════════════════════════════════ */
loadTools();
loadNews();
loadUpdates();
</script>
